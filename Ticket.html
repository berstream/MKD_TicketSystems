<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ticket System — Multi-Site</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root {
  --primary: #2563eb; --primary-dark: #1d4ed8;
  --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --info: #06b6d4;
  --gray-50:#f9fafb; --gray-100:#f3f4f6; --gray-200:#e5e7eb; --gray-300:#d1d5db;
  --gray-400:#9ca3af; --gray-500:#6b7280; --gray-600:#4b5563; --gray-700:#374151;
  --gray-800:#1f2937; --gray-900:#111827;
}
* { box-sizing:border-box; margin:0; padding:0; }
html,body { min-height:100%; font-family:'Sarabun',-apple-system,sans-serif; background:var(--gray-50); color:var(--gray-800); }
body { display:flex; flex-direction:column; }

/* ── TOPBAR ── */
.topbar { background:linear-gradient(135deg,#2563eb 0%,#1d4ed8 100%); color:#fff; padding:12px 20px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 2px 8px rgba(0,0,0,.08); position:sticky; top:0; z-index:100; gap:10px; }
.topbar h1 { font-size:17px; font-weight:700; display:flex; align-items:center; gap:8px; white-space:nowrap; }
.topbar h1 .logo { background:rgba(255,255,255,.15); padding:5px 10px; border-radius:8px; font-size:13px; }
.topbar-right { display:flex; gap:8px; align-items:center; flex-wrap:wrap; justify-content:flex-end; }
.topbar .user-info { font-size:12px; opacity:.9; }
.btn-icon { background:rgba(255,255,255,.15); border:none; color:#fff; width:36px; height:36px; border-radius:8px; cursor:pointer; position:relative; font-size:17px; }
.btn-icon:hover { background:rgba(255,255,255,.25); }
.btn-icon .badge { position:absolute; top:-4px; right:-4px; background:var(--danger); color:#fff; font-size:10px; min-width:17px; height:17px; border-radius:9px; padding:0 4px; display:flex; align-items:center; justify-content:center; font-weight:700; }
.btn-topbar { background:rgba(255,255,255,.15); color:#fff; border:none; padding:8px 12px; border-radius:8px; cursor:pointer; font-size:12px; font-family:inherit; font-weight:500; white-space:nowrap; }
.btn-topbar:hover { background:rgba(255,255,255,.25); }
.btn-topbar.off { opacity:.6; }

.container { flex:1; max-width:1280px; width:100%; margin:0 auto; padding:16px; }

/* ── LOGIN ── */
.login-wrap { display:flex; align-items:center; justify-content:center; min-height:calc(100vh - 62px); padding:16px; }
.login-card { background:#fff; padding:32px 26px; border-radius:16px; box-shadow:0 10px 40px rgba(0,0,0,.08); width:100%; max-width:440px; }
.login-card h2 { font-size:22px; font-weight:700; margin-bottom:4px; color:var(--gray-900); text-align:center; }
.login-card .subtitle { text-align:center; color:var(--gray-500); margin-bottom:22px; font-size:13px; }
.site-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); gap:10px; margin-bottom:16px; }
.site-card { border:2px solid var(--gray-300); border-radius:12px; padding:18px 8px; text-align:center; cursor:pointer; transition:.15s; background:#fff; font-family:inherit; }
.site-card:hover { border-color:var(--primary); transform:translateY(-2px); box-shadow:0 4px 12px rgba(37,99,235,.12); }
.site-card .site-icon { font-size:26px; margin-bottom:6px; }
.site-card .site-name { font-weight:700; font-size:14px; color:var(--gray-900); }
.divider { display:flex; align-items:center; gap:10px; color:var(--gray-400); font-size:12px; margin:16px 0; }
.divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--gray-200); }
.link-super { display:block; text-align:center; color:var(--gray-500); font-size:13px; cursor:pointer; background:none; border:none; font-family:inherit; width:100%; padding:8px; }
.link-super:hover { color:var(--primary); }
.back-link { color:var(--primary); cursor:pointer; font-size:13px; background:none; border:none; font-family:inherit; padding:0; margin-bottom:14px; display:inline-flex; align-items:center; gap:4px; }

/* ── FORMS ── */
.form-group { margin-bottom:14px; }
.form-group label { display:block; font-size:13px; font-weight:600; margin-bottom:5px; color:var(--gray-700); }
.form-group label .req { color:var(--danger); }
.form-control { width:100%; padding:10px 13px; border:1.5px solid var(--gray-300); border-radius:8px; font-size:14px; font-family:inherit; transition:.2s; background:#fff; }
.form-control:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(37,99,235,.1); }
.form-control:disabled { background:var(--gray-100); cursor:not-allowed; }
textarea.form-control { resize:vertical; min-height:85px; }
.btn { padding:10px 18px; border-radius:8px; border:none; cursor:pointer; font-size:14px; font-weight:600; font-family:inherit; transition:.2s; }
.btn-primary { background:var(--primary); color:#fff; }
.btn-primary:hover { background:var(--primary-dark); }
.btn-success { background:var(--success); color:#fff; }
.btn-warning { background:var(--warning); color:#fff; }
.btn-danger { background:var(--danger); color:#fff; }
.btn-secondary { background:var(--gray-200); color:var(--gray-700); }
.btn-secondary:hover { background:var(--gray-300); }
.btn-block { width:100%; }
.btn:disabled { opacity:.5; cursor:not-allowed; }
.btn-sm { padding:6px 11px; font-size:12px; }

/* ── TABS ── */
.tabs { display:flex; gap:2px; border-bottom:2px solid var(--gray-200); margin-bottom:16px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
.tab { padding:9px 14px; border:none; background:none; cursor:pointer; font-size:13px; font-weight:600; color:var(--gray-500); border-bottom:3px solid transparent; margin-bottom:-2px; white-space:nowrap; font-family:inherit; }
.tab:hover { color:var(--gray-700); }
.tab.active { color:var(--primary); border-bottom-color:var(--primary); }
.tab .tab-badge { background:var(--danger); color:#fff; font-size:10px; min-width:17px; height:17px; border-radius:9px; padding:0 4px; display:inline-flex; align-items:center; justify-content:center; font-weight:700; margin-left:5px; }
.tab-content { display:none; }
.tab-content.active { display:block; }

/* ── CARDS ── */
.card { background:#fff; border-radius:12px; padding:18px; box-shadow:0 1px 3px rgba(0,0,0,.04); border:1px solid var(--gray-200); }
.card-title { font-size:15px; font-weight:700; margin-bottom:14px; color:var(--gray-900); display:flex; align-items:center; gap:8px; flex-wrap:wrap; }

/* ── SITE CHIPS (dashboard filter) ── */
.site-chips { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
.site-chip { display:inline-flex; align-items:center; gap:6px; padding:8px 14px; border:2px solid var(--gray-300); border-radius:20px; background:#fff; cursor:pointer; font-size:13px; font-weight:600; font-family:inherit; color:var(--gray-600); transition:.15s; }
.site-chip.on { border-color:var(--primary); background:#eff6ff; color:var(--primary); }
.site-chip .chk { width:16px; height:16px; border:2px solid var(--gray-400); border-radius:4px; display:inline-flex; align-items:center; justify-content:center; font-size:10px; color:#fff; }
.site-chip.on .chk { background:var(--primary); border-color:var(--primary); }

/* ── TICKET LIST ── */
.ticket-list { display:flex; flex-direction:column; gap:8px; }
.ticket-item { background:#fff; border:1px solid var(--gray-200); border-radius:10px; padding:13px; cursor:pointer; transition:.15s; display:flex; gap:10px; align-items:flex-start; position:relative; }
.ticket-item:hover { box-shadow:0 4px 12px rgba(0,0,0,.06); border-color:var(--primary); }
.ticket-item.new-update { background:linear-gradient(90deg,#fef3c7 0%,#fff 30%); }
.ticket-item.overdue { border-left:4px solid var(--danger); }
.ticket-check { flex-shrink:0; margin-top:12px; width:18px; height:18px; cursor:pointer; accent-color:var(--primary); }
.ticket-icon { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.ticket-icon.pending { background:#fef3c7; }
.ticket-icon.inProgress { background:#dbeafe; }
.ticket-icon.resolved { background:#d1fae5; }
.ticket-body { flex:1; min-width:0; }
.ticket-title { font-weight:600; font-size:14px; color:var(--gray-900); margin-bottom:3px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.ticket-meta { display:flex; gap:10px; font-size:11px; color:var(--gray-500); flex-wrap:wrap; }
.ticket-meta span { display:inline-flex; align-items:center; gap:3px; }
.age-badge { font-size:10px; font-weight:700; padding:2px 7px; border-radius:10px; background:var(--gray-100); color:var(--gray-600); }
.age-badge.warn { background:#fef3c7; color:#92400e; }
.age-badge.late { background:#fee2e2; color:var(--danger); }
.comment-badge { font-size:10px; background:#e0f2fe; color:#0369a1; padding:2px 7px; border-radius:10px; font-weight:700; }
.status-badge { padding:3px 9px; border-radius:12px; font-size:10px; font-weight:700; white-space:nowrap; }
.status-pending { background:#fef3c7; color:#92400e; }
.status-inProgress { background:#dbeafe; color:#1e40af; }
.status-resolved { background:#d1fae5; color:#065f46; }
.priority-dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
.priority-urgent { background:var(--danger); }
.priority-normal { background:var(--warning); }
.priority-low { background:var(--success); }

/* ── BULK BAR ── */
.bulk-bar { position:sticky; bottom:12px; background:var(--gray-900); color:#fff; border-radius:12px; padding:12px 16px; display:none; align-items:center; gap:12px; box-shadow:0 8px 24px rgba(0,0,0,.25); z-index:50; flex-wrap:wrap; margin-top:12px; }
.bulk-bar.show { display:flex; }
.bulk-bar select { padding:8px 10px; border-radius:8px; border:none; font-family:inherit; font-size:13px; }

/* ── FILTER BAR ── */
.filter-bar { background:#fff; padding:12px 14px; border-radius:10px; border:1px solid var(--gray-200); margin-bottom:14px; display:flex; gap:10px; flex-wrap:wrap; align-items:end; }
.filter-bar .form-group { margin-bottom:0; flex:1; min-width:130px; }
.filter-bar select.form-control,.filter-bar input.form-control { padding:8px 10px; font-size:13px; }

/* ── DASHBOARD ── */
.stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:16px; }
.stat-card { background:#fff; border-radius:12px; padding:16px; border:1px solid var(--gray-200); position:relative; overflow:hidden; }
.stat-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; }
.stat-card.total::before { background:var(--primary); }
.stat-card.pending::before { background:var(--warning); }
.stat-card.inProgress::before { background:var(--info); }
.stat-card.resolved::before { background:var(--success); }
.stat-card.rating::before { background:#8b5cf6; }
.stat-card .stat-label { font-size:11px; color:var(--gray-500); font-weight:600; margin-bottom:5px; text-transform:uppercase; }
.stat-card .stat-value { font-size:28px; font-weight:700; color:var(--gray-900); line-height:1; }
.stat-card .stat-sub { font-size:11px; color:var(--gray-400); margin-top:5px; }
.chart-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }
.chart-card { background:#fff; padding:16px; border-radius:12px; border:1px solid var(--gray-200); }
.chart-card h3 { font-size:13px; font-weight:700; margin-bottom:12px; color:var(--gray-900); }
.chart-container { position:relative; height:260px; }
.chart-container.tall { height:300px; }
@media (max-width:768px) { .chart-grid { grid-template-columns:1fr; } }

/* ── MODAL ── */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; align-items:center; justify-content:center; z-index:1000; padding:14px; }
.modal-overlay.show { display:flex; }
.modal { background:#fff; border-radius:16px; max-width:720px; width:100%; max-height:92vh; overflow-y:auto; }
.modal-header { padding:16px 20px; border-bottom:1px solid var(--gray-200); display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; background:#fff; border-radius:16px 16px 0 0; z-index:5; }
.modal-header h2 { font-size:16px; font-weight:700; }
.modal-close { background:none; border:none; font-size:24px; cursor:pointer; color:var(--gray-500); line-height:1; padding:2px 8px; }
.modal-body { padding:20px; }
.modal-footer { padding:14px 20px; border-top:1px solid var(--gray-200); display:flex; gap:8px; justify-content:flex-end; position:sticky; bottom:0; background:#fff; flex-wrap:wrap; }
.detail-row { display:grid; grid-template-columns:120px 1fr; gap:12px; padding:9px 0; border-bottom:1px solid var(--gray-100); }
.detail-row .label { font-weight:600; color:var(--gray-600); font-size:12px; }
.detail-row .value { color:var(--gray-900); font-size:13px; word-break:break-word; }
.status-selector { display:flex; gap:6px; flex-wrap:wrap; }
.status-btn { flex:1; min-width:100px; padding:9px 6px; border:2px solid var(--gray-300); border-radius:8px; background:#fff; cursor:pointer; font-size:12px; font-weight:600; font-family:inherit; }
.status-btn.active[data-status="pending"] { border-color:var(--warning); background:#fef3c7; color:#92400e; }
.status-btn.active[data-status="inProgress"] { border-color:var(--info); background:#dbeafe; color:#1e40af; }
.status-btn.active[data-status="resolved"] { border-color:var(--success); background:#d1fae5; color:#065f46; }

/* ── COMMENTS ── */
.comment-thread { background:var(--gray-50); border-radius:10px; padding:12px; max-height:280px; overflow-y:auto; margin-bottom:10px; }
.comment-item { margin-bottom:10px; display:flex; flex-direction:column; }
.comment-item.admin { align-items:flex-end; }
.comment-bubble { max-width:85%; padding:9px 12px; border-radius:12px; font-size:13px; background:#fff; border:1px solid var(--gray-200); }
.comment-item.admin .comment-bubble { background:#dbeafe; border-color:#bfdbfe; }
.comment-meta { font-size:10px; color:var(--gray-400); margin-top:3px; }
.comment-input-row { display:flex; gap:8px; }
.comment-input-row input { flex:1; }

/* ── RATING ── */
.stars { display:flex; gap:4px; font-size:26px; cursor:pointer; }
.stars span { color:var(--gray-300); transition:.1s; }
.stars span.on { color:#f59e0b; }

/* ── PRIORITY ── */
.priority-group { display:flex; gap:8px; }
.priority-btn { flex:1; padding:9px 5px; border:2px solid var(--gray-300); border-radius:8px; background:#fff; cursor:pointer; font-size:12px; font-weight:600; font-family:inherit; }
.priority-btn.active.urgent { border-color:var(--danger); background:#fee2e2; color:var(--danger); }
.priority-btn.active.normal { border-color:var(--warning); background:#fef3c7; color:#92400e; }
.priority-btn.active.low { border-color:var(--success); background:#d1fae5; color:#065f46; }

/* ── IMAGE UPLOAD ── */
.image-upload { border:2px dashed var(--gray-300); padding:20px; border-radius:8px; text-align:center; cursor:pointer; display:block; }
.image-upload:hover { border-color:var(--primary); background:var(--gray-50); }
.image-preview { max-width:100%; max-height:180px; border-radius:8px; margin-top:10px; }

/* ── TABLES ── */
.dept-table { width:100%; background:#fff; border-radius:12px; overflow-x:auto; border:1px solid var(--gray-200); }
.dept-table table { width:100%; border-collapse:collapse; min-width:560px; }
.dept-table th { background:var(--gray-50); padding:10px 12px; text-align:left; font-size:12px; font-weight:700; color:var(--gray-700); border-bottom:1px solid var(--gray-200); white-space:nowrap; }
.dept-table td { padding:10px 12px; font-size:13px; border-bottom:1px solid var(--gray-100); }
.dept-table tr:last-child td { border-bottom:none; }
.toggle-switch { position:relative; display:inline-block; width:42px; height:23px; }
.toggle-switch input { opacity:0; width:0; height:0; }
.slider { position:absolute; cursor:pointer; inset:0; background:var(--gray-300); border-radius:23px; transition:.3s; }
.slider:before { position:absolute; content:""; height:17px; width:17px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:.3s; }
input:checked + .slider { background:var(--success); }
input:checked + .slider:before { transform:translateX(19px); }

/* ── TOAST ── */
.toast-container { position:fixed; top:70px; right:14px; z-index:2000; display:flex; flex-direction:column; gap:8px; max-width:340px; }
.toast { background:#fff; border-radius:10px; box-shadow:0 6px 24px rgba(0,0,0,.12); padding:12px 14px; border-left:4px solid var(--primary); display:flex; gap:10px; animation:slideIn .3s ease-out; cursor:pointer; }
.toast.success { border-left-color:var(--success); }
.toast.warning { border-left-color:var(--warning); }
.toast.error { border-left-color:var(--danger); }
.toast.info { border-left-color:var(--info); }
.toast-icon { font-size:18px; flex-shrink:0; }
.toast-body { flex:1; min-width:0; }
.toast-title { font-weight:700; font-size:13px; margin-bottom:2px; }
.toast-msg { font-size:12px; color:var(--gray-600); }
@keyframes slideIn { from { transform:translateX(400px); opacity:0; } to { transform:translateX(0); opacity:1; } }
@keyframes fadeOut { to { opacity:0; transform:translateX(400px); } }
.toast.removing { animation:fadeOut .3s ease-in forwards; }

/* ── NOTIF DROPDOWN ── */
.notif-dropdown { position:absolute; top:48px; right:0; background:#fff; border-radius:12px; box-shadow:0 10px 40px rgba(0,0,0,.15); width:340px; max-height:460px; overflow-y:auto; display:none; z-index:200; color:var(--gray-800); }
.notif-dropdown.show { display:block; }
.notif-header { padding:12px 14px; border-bottom:1px solid var(--gray-200); font-weight:700; font-size:13px; }
.notif-item { padding:11px 14px; border-bottom:1px solid var(--gray-100); cursor:pointer; }
.notif-item:hover { background:var(--gray-50); }
.notif-title { font-weight:600; font-size:12px; color:var(--gray-900); }
.notif-meta { font-size:10px; color:var(--gray-500); margin-top:2px; }
.notif-empty { padding:36px 18px; text-align:center; color:var(--gray-400); font-size:12px; }

/* ── MISC ── */
.empty-state { text-align:center; padding:50px 18px; color:var(--gray-400); }
.empty-state .icon { font-size:44px; margin-bottom:8px; }
.empty-state .title { font-size:15px; font-weight:600; color:var(--gray-600); margin-bottom:4px; }
.loading { display:inline-block; width:15px; height:15px; border:2px solid var(--gray-300); border-top-color:var(--primary); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-page { display:flex; align-items:center; justify-content:center; padding:36px; gap:10px; color:var(--gray-500); }
.draft-banner { background:#fef3c7; border:1px solid var(--warning); padding:9px 12px; border-radius:8px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; font-size:12px; gap:8px; flex-wrap:wrap; }
.chip { display:inline-flex; align-items:center; gap:5px; background:var(--gray-100); padding:5px 9px; border-radius:8px; font-size:12px; }
.export-preview { max-height:360px; overflow-y:auto; background:var(--gray-50); padding:14px; border-radius:8px; margin-top:10px; font-size:12px; }
code { background:var(--gray-100); padding:2px 6px; border-radius:5px; font-size:12px; }

/* ── RESPONSIVE ── */
@media (max-width:600px) {
  .topbar { padding:10px 12px; }
  .topbar h1 { font-size:14px; }
  .topbar h1 .logo { display:none; }
  .container { padding:10px; }
  .detail-row { grid-template-columns:1fr; gap:3px; }
  .stat-grid { grid-template-columns:repeat(2,1fr); }
  .stat-card .stat-value { font-size:22px; }
  .notif-dropdown { position:fixed; top:58px; right:6px; left:6px; width:auto; }
  .modal { max-height:95vh; border-radius:12px; }
  .modal-body { padding:14px; }
  .filter-bar .form-group { min-width:100%; }
  .bulk-bar { position:fixed; left:10px; right:10px; bottom:10px; }
}
@media print {
  .topbar,.tabs,.filter-bar,.modal-footer,.topbar-right,.bulk-bar { display:none !important; }
  body { background:#fff; }
}
</style>
</head>
<body>

<header class="topbar">
  <h1><span class="logo" id="siteBadge">🎫</span> <span id="appTitle">Ticket System</span></h1>
  <div class="topbar-right" id="topbarRight" style="display:none;">
    <button class="btn-topbar off" id="soundToggle" onclick="toggleSound()"><span id="soundIcon">🔕</span> <span id="soundLabel">เปิดเสียง</span></button>
    <button class="btn-icon" id="bellBtn" onclick="toggleNotifDropdown()" style="display:none;">🔔<span class="badge" id="bellBadge" style="display:none;">0</span></button>
    <div class="notif-dropdown" id="notifDropdown">
      <div class="notif-header">การแจ้งเตือน (ยังไม่อ่าน)</div>
      <div id="notifList"></div>
    </div>
    <div class="user-info" id="userInfo"></div>
    <button class="btn-topbar" onclick="openChangePasswordModal()" title="เปลี่ยนรหัสผ่าน" id="btnChangePw">🔑</button>
    <button class="btn-topbar" onclick="logout()">ออก</button>
  </div>
</header>

<div id="toastContainer" class="toast-container"></div>

<script>
/* ═══════ CONFIG — แก้เป็น GAS URL หลัง deploy ═══════ */
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwQzQagHL3ILYpgn2pjdfbLS9fmiJ7tv929RLBXnena00a3UGuPmQP-GK7oTERwEdDe/exec';

let state = {
  sites: [], user: null, superMode: false, superKey: null,
  depts: [], positions: [], categories: [], bus: [], tickets: [],
  currentTab: '', currentTicket: null, currentComments: [],
  pollTimer: null, pollNow: null, idleTimer: null,
  notifTickets: [], readTicketIds: new Set(), knownSnapshot: {}, primed: false,
  updatedTicketIds: new Set(), highlightUnread: new Set(),
  soundOn: false, audioCtx: null,
  selectedTickets: new Set(),
  dashSites: new Set(), filters: {},
  allPositions: [], showPasswords: false,
  pendingStatus: null, selSiteId: null, archiveTickets: [],
  adminPage: 1, myPage: 1
};

/* ═══════ API ═══════ */
async function apiGet(action, params = {}) {
  const url = new URL(GAS_URL);
  url.searchParams.set('action', action);
  Object.keys(params).forEach(k => { if (params[k] != null) url.searchParams.set(k, params[k]); });
  url.searchParams.set('_t', Date.now());
  const res = await fetch(url.toString(), { method: 'GET', cache: 'no-store' });
  return await res.json();
}
async function apiPost(action, data = {}) {
  const res = await fetch(GAS_URL, {
    method: 'POST', body: JSON.stringify({ action, ...data }),
    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
  });
  return await res.json();
}

/* ═══════ UTIL ═══════ */
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function parseDateMs(v) {
  if (!v) return 0;
  const s = String(v).trim();
  const m = s.match(/(\d{4})-(\d{1,2})-(\d{1,2})[ T](\d{1,2}):(\d{1,2}):?(\d{1,2})?/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3], +m[4], +m[5], +(m[6]||0)).getTime();
  const t = Date.parse(s);
  return isNaN(t) ? 0 : t;
}
function ageInfo(createdAt, status, priority) {
  if (status === 'resolved') return null;
  const hrs = Math.floor((Date.now() - parseDateMs(createdAt)) / 3600000);
  const limit = priority === 'urgent' ? 2 : priority === 'normal' ? 24 : 72;
  const cls = hrs >= limit ? 'late' : hrs >= limit * 0.7 ? 'warn' : '';
  const label = hrs < 1 ? '< 1 ชม.' : hrs < 24 ? hrs + ' ชม.' : Math.floor(hrs/24) + ' วัน';
  return { label: 'ค้าง ' + label, cls, overdue: hrs >= limit };
}
function statusText(s) { return { pending:'รอดำเนินการ', inProgress:'กำลังดำเนินการ', resolved:'แล้วเสร็จ' }[s] || s; }
function prioText(p) { return { urgent:'🔴 เร่งด่วน', normal:'🟡 ปกติ', low:'🟢 ไม่เร่งด่วน' }[p] || p; }

/* ═══════ TOAST ═══════ */
function toast(title, msg, type = 'info', onClick = null) {
  const c = document.getElementById('toastContainer');
  const div = document.createElement('div');
  div.className = 'toast ' + type;
  const icons = { success:'✅', warning:'⚠️', error:'❌', info:'ℹ️' };
  div.innerHTML = `<div class="toast-icon">${icons[type]||'ℹ️'}</div><div class="toast-body"><div class="toast-title">${escapeHtml(title)}</div><div class="toast-msg">${escapeHtml(msg)}</div></div>`;
  if (onClick) div.onclick = () => { onClick(); removeToast(div); };
  c.appendChild(div);
  setTimeout(() => removeToast(div), 5000);
}
function removeToast(el) {
  if (!el || !el.parentNode) return;
  el.classList.add('removing');
  setTimeout(() => el.remove(), 300);
}

/* ═══════ SOUND ═══════ */
function initAudio() {
  if (!state.audioCtx) { try { state.audioCtx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e) {} }
  if (state.audioCtx && state.audioCtx.state === 'suspended') state.audioCtx.resume();
}
function playDing() {
  if (!state.soundOn || !state.audioCtx) return;
  try {
    const ctx = state.audioCtx, osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + .15);
    gain.gain.setValueAtTime(.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + .5);
    osc.start(); osc.stop(ctx.currentTime + .5);
  } catch(e) {}
}
function toggleSound() {
  if (!state.soundOn) {
    initAudio(); state.soundOn = true;
    document.getElementById('soundIcon').textContent = '🔔';
    document.getElementById('soundLabel').textContent = 'เสียงเปิด';
    document.getElementById('soundToggle').classList.remove('off');
    setTimeout(playDing, 100);
    toast('เปิดเสียงแจ้งเตือนแล้ว', '', 'success');
  } else {
    state.soundOn = false;
    document.getElementById('soundIcon').textContent = '🔕';
    document.getElementById('soundLabel').textContent = 'เปิดเสียง';
    document.getElementById('soundToggle').classList.add('off');
  }
}

/* ═══════ SESSION (localStorage + cookie) ═══════ */
const SESSION_KEY = 'tk_session';
const SESSION_HOURS = 12;
function saveSession() {
  const json = JSON.stringify({ user: state.user, superMode: state.superMode, superKey: state.superKey, expires: Date.now() + SESSION_HOURS*3600000 });
  try { localStorage.setItem(SESSION_KEY, json); } catch(e) {}
  try { document.cookie = SESSION_KEY + '=' + encodeURIComponent(json) + ';path=/;max-age=' + SESSION_HOURS*3600 + ';SameSite=Lax'; } catch(e) {}
}
function loadSession() {
  let raw = null;
  try { raw = localStorage.getItem(SESSION_KEY); } catch(e) {}
  if (!raw) raw = getCookieVal(SESSION_KEY);
  if (!raw) return null;
  try {
    const p = JSON.parse(raw);
    if (!p.expires || Date.now() > p.expires) { clearSession(); return null; }
    try { localStorage.setItem(SESSION_KEY, raw); } catch(e) {}
    return p;
  } catch(e) { return null; }
}
function clearSession() {
  try { localStorage.removeItem(SESSION_KEY); } catch(e) {}
  try { document.cookie = SESSION_KEY + '=;path=/;max-age=0'; } catch(e) {}
}
function getCookieVal(name) {
  try {
    const m = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)'));
    return m ? decodeURIComponent(m[1]) : null;
  } catch(e) { return null; }
}

/* ═══════ READ-IDS ═══════ */
function loadReadIds(key) {
  try { const raw = localStorage.getItem(key); return raw ? new Set(JSON.parse(raw)) : new Set(); } catch(e) { return new Set(); }
}
function saveReadIds(key, set) {
  try { localStorage.setItem(key, JSON.stringify(Array.from(set).slice(-500))); } catch(e) {}
}

/* ═══════ IDLE LOGOUT (30 นาที) ═══════ */
const IDLE_MS = 30*60*1000;
let lastActivity = Date.now();
function startIdleWatch() {
  lastActivity = Date.now();
  ['click','keydown','mousemove','touchstart','scroll'].forEach(ev => document.addEventListener(ev, () => lastActivity = Date.now(), { passive:true }));
  if (state.idleTimer) clearInterval(state.idleTimer);
  state.idleTimer = setInterval(() => {
    if (!state.user && !state.superMode) return;
    const idle = Date.now() - lastActivity;
    if (idle > IDLE_MS - 120000 && idle < IDLE_MS - 60000) toast('⏰ ใกล้หมดเวลา', 'จะออกจากระบบใน 2 นาที (ขยับเมาส์เพื่อใช้งานต่อ)', 'warning');
    if (idle >= IDLE_MS) logout('idle');
  }, 60000);
}

/* ═══════ VIEWS ═══════ */
function showView(id) {
  ['siteSelectView','loginView','superLoginView','appView'].forEach(v => {
    document.getElementById(v).style.display = (v === id) ? (id === 'appView' ? 'block' : 'flex') : 'none';
  });
}

async function loadSites() {
  try {
    const r = await apiGet('getSites');
    if (!r.ok) throw new Error(r.error);
    state.sites = r.sites;
    document.getElementById('siteGrid').innerHTML = r.sites.map(s => `
      <button class="site-card" onclick="selectSite('${s.id}')">
        <div class="site-icon">🏭</div>
        <div class="site-name">${escapeHtml(s.id)}</div>
        <div style="font-size:10px;color:var(--gray-500);margin-top:2px;">${escapeHtml(s.name)}</div>
      </button>`).join('') || '<div class="empty-state"><div class="title">ยังไม่มี Site — รอ Super Admin สร้าง</div></div>';
  } catch(e) {
    document.getElementById('siteGrid').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><div class="title">เชื่อมต่อไม่ได้</div><div style="font-size:12px;">ตรวจสอบ GAS URL / อินเทอร์เน็ต แล้วรีเฟรช</div></div>';
  }
}

async function selectSite(siteId) {
  state.selSiteId = siteId;
  const site = state.sites.find(s => s.id === siteId);
  document.getElementById('loginSiteName').textContent = '🏭 ' + (site ? site.name : siteId);
  showView('loginView');
  document.getElementById('loginDept').innerHTML = '<option value="">กำลังโหลด...</option>';
  try {
    const [d, p] = await Promise.all([apiGet('getDepts', { siteId }), apiGet('getPositions', { siteId })]);
    state.depts = d.ok ? d.departments : [];
    state.positions = p.ok ? p.positions : [];
    document.getElementById('loginDept').innerHTML = '<option value="">-- เลือกแผนก --</option>' +
      state.depts.map(x => `<option value="${x.id}">${escapeHtml(x.name)}</option>`).join('');
  } catch(e) {
    toast('โหลดข้อมูลไม่สำเร็จ', 'ลองใหม่อีกครั้ง', 'error');
  }
}

function backToSites() { showView('siteSelectView'); }
function showSuperLogin() { showView('superLoginView'); }

function onDeptChange() {
  const deptId = document.getElementById('loginDept').value;
  const sel = document.getElementById('loginPosition');
  if (!deptId) { sel.innerHTML = '<option value="">-- เลือกแผนกก่อน --</option>'; sel.disabled = true; return; }
  const filtered = state.positions.filter(p => p.deptId === deptId);
  sel.innerHTML = '<option value="">-- เลือกตำแหน่ง --</option>' + filtered.map(p => `<option value="${escapeHtml(p.name)}">${escapeHtml(p.name)}</option>`).join('');
  sel.disabled = false;
}

async function doLogin() {
  const deptId = document.getElementById('loginDept').value;
  const position = document.getElementById('loginPosition').value;
  const password = document.getElementById('loginPassword').value;
  if (!deptId || !position || !password) { toast('กรุณากรอกข้อมูล', 'เลือกแผนก ตำแหน่ง และกรอกรหัสผ่าน', 'warning'); return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.innerHTML = '<span class="loading"></span> กำลังเข้าสู่ระบบ...';
  try {
    const r = await apiGet('login', { siteId: state.selSiteId, deptId, position, password });
    if (r.ok) {
      state.user = r.user;
      const dept = state.depts.find(d => d.id === deptId);
      state.user.deptName = dept ? dept.name : '';
      const site = state.sites.find(s => s.id === state.selSiteId);
      state.user.siteName = site ? site.name : state.selSiteId;
      if (state.user.isAdmin) state.user.adminKey = password;
      state.superMode = false; state.superKey = null;
      saveSession();
      enterApp();
    } else {
      toast('เข้าสู่ระบบไม่สำเร็จ', r.error || 'รหัสผ่านไม่ถูกต้อง', 'error');
    }
  } catch(e) { toast('เกิดข้อผิดพลาด', e.message, 'error'); }
  finally { btn.disabled = false; btn.textContent = 'เข้าสู่ระบบ'; }
}

async function doSuperLogin() {
  const password = document.getElementById('superPassword').value;
  if (!password) { toast('กรอกรหัสผ่าน', '', 'warning'); return; }
  const btn = document.getElementById('superLoginBtn');
  btn.disabled = true; btn.innerHTML = '<span class="loading"></span>...';
  try {
    const r = await apiGet('loginSuper', { password });
    if (r.ok) {
      state.superMode = true; state.superKey = password; state.user = null;
      saveSession();
      enterSuperApp();
    } else {
      toast('ไม่สำเร็จ', r.error, 'error');
    }
  } catch(e) { toast('เกิดข้อผิดพลาด', e.message, 'error'); }
  finally { btn.disabled = false; btn.textContent = 'เข้าสู่ระบบ'; }
}

function logout(silent) {
  if (state.pollTimer) clearInterval(state.pollTimer);
  if (state.idleTimer) clearInterval(state.idleTimer);
  clearSession();
  state.user = null; state.superMode = false; state.superKey = null;
  state.pollTimer = null; state.idleTimer = null; state.primed = false;
  state.knownSnapshot = {}; state.notifTickets = []; state.updatedTicketIds = new Set();
  document.getElementById('topbarRight').style.display = 'none';
  document.getElementById('appTitle').textContent = 'Ticket System';
  document.getElementById('siteBadge').textContent = '🎫';
  document.getElementById('loginPassword').value = '';
  document.getElementById('superPassword').value = '';
  showView('siteSelectView');
  if (silent === 'idle') toast('ออกจากระบบอัตโนมัติ', 'ไม่มีการใช้งานเกิน 30 นาที', 'warning');
}

/* ═══════ MASTER DATA CACHE (ไม่แตะ login — ใช้หลัง login แล้วเท่านั้น) ═══════
   cache แผนก/ตำแหน่ง/BU/หมวดหมู่ ใน localStorage เพื่อให้เปิดแอปไว
   - โหลดจาก cache ทันที (ถ้ามี) แล้วดึงสดมาอัปเดตเบื้องหลัง
   - invalidate ทันทีเมื่อ IT Admin แก้ไข master data
   หมายเหตุ: login ไม่ใช้ cache นี้เลย — ดึงสดเสมอ */
const CACHE_TTL_MS = 6 * 3600000; // 6 ชม.
function cacheKey(siteId, type) { return 'tk_cache_' + type + '_' + siteId; }
function readCache(siteId, type) {
  try {
    const raw = localStorage.getItem(cacheKey(siteId, type));
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (!obj.t || Date.now() - obj.t > CACHE_TTL_MS) return null;
    return obj.d;
  } catch(e) { return null; }
}
function writeCache(siteId, type, data) {
  try { localStorage.setItem(cacheKey(siteId, type), JSON.stringify({ t: Date.now(), d: data })); } catch(e) {}
}
function invalidateCache(siteId, type) {
  try { localStorage.removeItem(cacheKey(siteId, type)); } catch(e) {}
}
/** โหลด master data: ใช้ cache ก่อน (เร็ว) + ดึงสดมาอัปเดตเบื้องหลัง */
async function loadMasterData(siteId, opts) {
  opts = opts || {};
  // 1) ลอง cache ก่อน — เปิดแอปไวทันที
  const cCat = readCache(siteId, 'cat');
  const cBU = readCache(siteId, 'bu');
  if (cCat) state.categories = cCat;
  if (cBU) state.bus = cBU;
  const hadCache = cCat && cBU;

  // 2) ดึงสด (ถ้าไม่มี cache = รอ, ถ้ามี cache = เบื้องหลัง)
  const fetchFresh = async () => {
    try {
      const [c, b] = await Promise.all([
        apiGet('getCategories', { siteId }),
        apiGet('getBUs', { siteId })
      ]);
      if (c.ok) { state.categories = c.categories; writeCache(siteId, 'cat', c.categories); }
      if (b.ok) { state.bus = b.bus; writeCache(siteId, 'bu', b.bus); }
      if (hadCache && opts.onRefresh) opts.onRefresh();
    } catch(e) {}
  };
  if (hadCache) { fetchFresh(); } // เบื้องหลัง ไม่รอ
  else { await fetchFresh(); }     // ครั้งแรก ต้องรอ
}

/* ═══════ ENTER APP ═══════ */
async function enterApp() {
  showView('appView');
  document.getElementById('topbarRight').style.display = 'flex';
  document.getElementById('btnChangePw').style.display = '';
  document.getElementById('siteBadge').textContent = state.user.siteId;
  document.getElementById('appTitle').textContent = 'Ticket System';
  document.getElementById('userInfo').textContent = state.user.position + ' • ' + state.user.siteName;
  // โหลด master data (มี cache — เปิดไว)
  await loadMasterData(state.user.siteId, {
    onRefresh: () => { if (state.currentTab === 'submit') { const el = document.getElementById('tab-submit'); if (el) el.innerHTML = renderSubmitForm(); setupDraftAutoSave(); } }
  });
  startIdleWatch();
  if (state.user.isAdmin) {
    document.getElementById('bellBtn').style.display = 'block';
    renderAdminApp();
    startAdminPoll();
  } else {
    document.getElementById('bellBtn').style.display = 'none';
    renderUserApp();
    startUserPoll();
  }
}

/* ═══════ EMPLOYEE APP ═══════ */

    </div>
    <div class="tab-content active" id="tab-submit">${renderSubmitForm()}</div>
    <div class="tab-content" id="tab-myTickets"></div>`;

function renderSubmitForm() {
  const mains = [...new Set(state.categories.map(c => c.main))];
  return `
    <div class="card">
      <div class="card-title">📝 แจ้งปัญหาใหม่ — ${escapeHtml(state.user.siteName)}</div>
      <div id="draftBanner"></div>
      <div class="form-group">
        <label>BU <span class="req">*</span></label>
        <select id="f_bu" class="form-control">

          ${state.bus.map(b => `<option value="${escapeHtml(b.id + ' ' + b.name)}">${escapeHtml(b.id)} — ${escapeHtml(b.name)}</option>`).join('')}
        </select>
        ${state.bus.length === 0 ? '<div style="font-size:11px;color:var(--warning);margin-top:4px;">⚠️ ยังไม่มี BU — แจ้ง IT Admin เพิ่มในเมนูจัดการ</div>' : ''}
      </div>
      <div class="form-group"><label>ชื่อปัญหา <span class="req">*</span></label>
        <input type="text" id="f_title" class="form-control" placeholder="เช่น Router ห้อง Pack ใช้งานไม่ได้"></div>
      <div class="form-group"><label>หมวดหมู่หลัก <span class="req">*</span></label>
        <select id="f_main" class="form-control" onchange="onMainCatChange()">
          <option value="">-- เลือกหมวดหมู่ --</option>

function onMainCatChange() {
  const main = document.getElementById('f_main').value;
  const sel = document.getElementById('f_sub');
  if (!main) { sel.innerHTML = '<option value="">-- เลือกหมวดหมู่หลักก่อน --</option>'; sel.disabled = true; return; }
  const subs = state.categories.filter(c => c.main === main);
  sel.innerHTML = '<option value="">-- เลือก --</option>' + subs.map(c => `<option value="${escapeHtml(c.sub)}">${escapeHtml(c.sub)}</option>`).join('');
  sel.disabled = false;

}
function selectPriority(p) {
  document.querySelectorAll('#prioGroup .priority-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`#prioGroup .priority-btn[data-prio="${p}"]`).classList.add('active');
  saveDraft();
}

let currentImageData = null;
async function onImageSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  const compressed = await compressImage(file);
  currentImageData = compressed;
  const img = document.getElementById('imagePreview');
  img.src = compressed.dataUrl; img.style.display = 'block';
}
function compressImage(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > 1200) { h = h*1200/w; w = 1200; }
        if (h > 1200) { w = w*1200/h; h = 1200; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', .75);
        resolve({ dataUrl, base64: dataUrl.split(',')[1], mimeType:'image/jpeg', filename:file.name });
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function submitTicket() {
  const bu = document.getElementById('f_bu').value;
  const title = document.getElementById('f_title').value.trim();
  const main = document.getElementById('f_main').value;
  const sub = document.getElementById('f_sub').value;
  const desc = document.getElementById('f_desc').value.trim();
  const reporter = document.getElementById('f_reporter').value.trim();
  const phone = document.getElementById('f_phone').value.trim();
  const prio = document.querySelector('#prioGroup .priority-btn.active').dataset.prio;
  if (!title || !main || !sub || !desc || !reporter || !phone || !bu) {
    toast('กรุณากรอกข้อมูล', 'ช่องที่มี * ต้องกรอกครบ', 'warning'); return;
  }
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.innerHTML = '<span class="loading"></span> กำลังส่ง...';
  try {
    let imageUrl = '';
    if (currentImageData) {
      btn.innerHTML = '<span class="loading"></span> อัปโหลดรูป...';
      const up = await apiPost('uploadImage', currentImageData);
      if (up.ok) imageUrl = up.url;
    }
    btn.innerHTML = '<span class="loading"></span> บันทึก...';
    const r = await apiPost('submitTicket', {
      siteId: state.user.siteId, deptId: state.user.deptId, deptName: state.user.deptName,
      category: main, subCategory: sub, title, description: desc, imageUrl,
      reporterName: reporter, position: state.user.position, priority: prio,
      bu, phone
    });
    if (r.ok) {
      toast('ส่ง Ticket สำเร็จ', 'หมายเลข: ' + r.ticketId, 'success');
      clearDraft(); resetSubmitForm();
    } else toast('ส่งไม่สำเร็จ', r.error || '', 'error');
  } catch(e) { toast('เกิดข้อผิดพลาด', e.message, 'error'); }
  finally { btn.disabled = false; btn.textContent = 'ส่ง Ticket'; }
}

function resetSubmitForm() {
  ['f_title','f_desc','f_reporter','f_phone'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f_bu').value = '';
  document.getElementById('f_main').value = '';
  document.getElementById('f_sub').innerHTML = '<option value="">-- เลือกหมวดหมู่หลักก่อน --</option>';
  document.getElementById('f_sub').disabled = true;
  document.getElementById('imagePreview').style.display = 'none';
  document.getElementById('f_image').value = '';
  currentImageData = null;
  selectPriority('normal');
}

/* ═══════ DRAFT ═══════ */
const DRAFT_KEY = 'tk_draft';
function saveDraft() {
  const d = {
    bu: document.getElementById('f_bu')?.value || '',
    title: document.getElementById('f_title')?.value || '',
    main: document.getElementById('f_main')?.value || '',
    sub: document.getElementById('f_sub')?.value || '',
    desc: document.getElementById('f_desc')?.value || '',
    reporter: document.getElementById('f_reporter')?.value || '',
    phone: document.getElementById('f_phone')?.value || '',
    prio: document.querySelector('#prioGroup .priority-btn.active')?.dataset.prio || 'normal'
  };
  if (d.title || d.desc || d.reporter) sessionStorage.setItem(DRAFT_KEY, JSON.stringify(d));
}
function setupDraftAutoSave() {
  ['f_title','f_desc','f_reporter','f_phone','f_main','f_sub','f_bu'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', saveDraft);
  });
}
function clearDraft() { sessionStorage.removeItem(DRAFT_KEY); const b = document.getElementById('draftBanner'); if (b) b.innerHTML = ''; }
function initDraftRestore() {
  if (!sessionStorage.getItem(DRAFT_KEY)) return;
  document.getElementById('draftBanner').innerHTML = `
    <div class="draft-banner"><span>💾 พบข้อมูลที่ยังไม่ได้ส่ง</span>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-primary btn-sm" onclick="restoreDraft()">กู้คืน</button>
        <button class="btn btn-secondary btn-sm" onclick="clearDraft()">ทิ้ง</button>
      </div></div>`;
}
function restoreDraft() {
  const raw = sessionStorage.getItem(DRAFT_KEY);
  if (!raw) return;
  const d = JSON.parse(raw);
  document.getElementById('f_bu').value = d.bu || '';
  document.getElementById('f_title').value = d.title || '';
  document.getElementById('f_main').value = d.main || '';
  onMainCatChange();
  setTimeout(() => { document.getElementById('f_sub').value = d.sub || ''; }, 50);
  document.getElementById('f_desc').value = d.desc || '';
  document.getElementById('f_reporter').value = d.reporter || '';
  document.getElementById('f_phone').value = d.phone || '';
  if (d.prio) selectPriority(d.prio);
  document.getElementById('draftBanner').innerHTML = '';
}

function ticketMatchesSearch(t, q) {
  if (!q) return true;
  const hay = [t.ticketId,t.title,t.description,t.reporterName,t.category,t.subCategory,t.deptName,t.adminNote,t.bu,t.phone,t.assignedTo]
    .map(x => String(x||'').toLowerCase()).join(' ');
  return q.toLowerCase().split(/\s+/).filter(Boolean).every(w => hay.includes(w));
}

const MY_PAGE_SIZE = 50;
function renderMyTicketsList() {
  const f = document.getElementById('myFilterStatus')?.value || '';
  const q = document.getElementById('myFilterSearch')?.value.trim() || '';
  const list = document.getElementById('myTicketList');
  const pager = document.getElementById('myPager');
  let filtered = f ? state.tickets.filter(t => t.status === f) : state.tickets;
  filtered = filtered.filter(t => ticketMatchesSearch(t, q));
  if (!filtered.length) { list.innerHTML = '<div class="empty-state"><div class="title">ไม่มีรายการ</div></div>'; if (pager) pager.innerHTML = ''; return; }
  const page = state.myPage || 1;
  const shown = filtered.slice(0, page * MY_PAGE_SIZE);
  list.innerHTML = shown.map(t => ticketCardHTML(t, { highlight: state.updatedTicketIds.has(t.ticketId) })).join('');
  if (pager) {
    if (shown.length < filtered.length) pager.innerHTML = `<button class="btn btn-secondary" onclick="loadMoreMy()">โหลดเพิ่ม (${shown.length}/${filtered.length})</button>`;
    else pager.innerHTML = '';
  }
}
function loadMoreMy() { state.myPage = (state.myPage || 1) + 1; renderMyTicketsList(); }

function ticketCardHTML(t, opt = {}) {
  const icons = { pending:'⏳', inProgress:'🔧', resolved:'✅' };
  const age = ageInfo(t.createdAt, t.status, t.priority);
  const cc = parseInt(t.commentCount) || 0;
  return `
    <div class="ticket-item ${opt.highlight ? 'new-update' : ''} ${age && age.overdue ? 'overdue' : ''}" onclick="openTicketDetail('${t.ticketId}'${opt.siteId ? `,'${opt.siteId}'` : ''})">
      ${opt.selectable ? `<input type="checkbox" class="ticket-check" data-tid="${t.ticketId}" onclick="event.stopPropagation();toggleSelect('${t.ticketId}',this)" ${state.selectedTickets.has(t.ticketId) ? 'checked' : ''}>` : ''}
      <div class="ticket-icon ${t.status}">${icons[t.status] || '⏳'}</div>
      <div class="ticket-body">
        <div class="ticket-title">${escapeHtml(t.title)}
          ${cc > 0 ? `<span class="comment-badge">💬 ${cc}</span>` : ''}
          ${age ? `<span class="age-badge ${age.cls}">${age.label}</span>` : ''}
          ${t.status === 'resolved' && t.resolveDurationHrs !== '' && t.resolveDurationHrs != null ? `<span class="age-badge" style="background:#d1fae5;color:#065f46;">✓ ${fmtDuration(t.resolveDurationHrs)}</span>` : ''}
          ${t.rating ? `<span style="font-size:11px;color:#f59e0b;">⭐${t.rating}</span>` : ''}
        </div>
        <div class="ticket-meta">
          <span><span class="priority-dot priority-${t.priority}"></span>${t.priority === 'urgent' ? 'เร่งด่วน' : t.priority === 'low' ? 'ไม่เร่งด่วน' : 'ปกติ'}</span>
          <span>📂 ${escapeHtml(t.category)} - ${escapeHtml(t.subCategory)}</span>
          ${t.bu ? `<span>🏷️ ${escapeHtml(t.bu)}</span>` : ''}
          <span>🏢 ${escapeHtml(t.deptName)}</span>
          ${t.assignedTo ? `<span>👨‍💻 ${escapeHtml(t.assignedTo)}</span>` : ''}
          <span>🕒 ${escapeHtml(String(t.createdAt))}</span>
        </div>
      </div>
      <span class="status-badge status-${t.status}">${statusText(t.status)}</span>
    </div>`;
}

function fmtDuration(hrs) {
  const h = parseFloat(hrs);
  if (isNaN(h)) return '';
  if (h < 1) return Math.round(h * 60) + ' นาที';
  if (h < 24) return h + ' ชม.';
  const d = Math.floor(h / 24), rem = Math.round(h % 24);
  return d + ' วัน' + (rem > 0 ? ' ' + rem + ' ชม.' : '');
}

function switchTab(tab) {
  state.currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + tab));
  if (tab === 'myTickets') { loadMyTickets(); state.updatedTicketIds.clear(); updateUserBadge(); }
  if (tab === 'dashboard') loadDashboard();
  if (tab === 'allTickets') loadAdminTickets();
  if (tab === 'export') loadExportPanel();
  if (tab === 'manage') loadManagePanel();
  if (tab === 'archive') loadArchive();
  if (tab === 'spSites') loadSuperSites();
  if (tab === 'spTrash') loadTrash();
  if (tab === 'spLog') loadAuditLog();
}

async function openTicketDetail(ticketId, siteId) {
  const sid = siteId || (state.user ? state.user.siteId : null);
  if (!sid) return;
  const r = await apiGet('getTicket', { siteId: sid, ticketId });
  if (!r.ok) { toast('ไม่พบ Ticket', '', 'error'); return; }
  state.currentTicket = r.ticket;
  state.currentTicket._siteId = sid;
  state.pendingStatus = r.ticket.status;

  if (state.user && state.user.isAdmin) markTicketRead(ticketId);
  else if (state.user) {
    state.updatedTicketIds.delete(ticketId);
    updateUserBadge();
  }
  renderTicketModal();
  document.getElementById('ticketModal').classList.add('show');
  loadComments();
  loadTimeline();
}

async function loadTimeline() {
  const t = state.currentTicket;
  const box = document.getElementById('timelineBox');
  if (!box) return;
  try {
    const r = await apiGet('getStatusHistory', { siteId: t._siteId, ticketId: t.ticketId });
    const steps = [];
    steps.push({ icon:'📝', label:'แจ้งปัญหา', at: t.createdAt, by: t.reporterName });
    if (r.ok && r.history.length) {
      r.history.forEach(h => {
        const icon = h.to === 'inProgress' ? '🔧' : h.to === 'resolved' ? '✅' : '⏳';
        steps.push({ icon, label: statusText(h.to), at: h.at, by: h.by });
      });
    }
    box.innerHTML = steps.map((s, i) => `
      <div style="display:flex;gap:8px;align-items:flex-start;${i < steps.length-1 ? 'padding-bottom:8px;' : ''}">
        <span style="font-size:14px;">${s.icon}</span>
        <div style="flex:1;">
          <div style="font-size:12px;font-weight:600;">${escapeHtml(s.label)}</div>
          <div style="font-size:10px;color:var(--gray-500);">${escapeHtml(String(s.at))} ${s.by ? '• ' + escapeHtml(s.by) : ''}</div>
        </div>
      </div>`).join('');
  } catch(e) { box.innerHTML = '<span style="color:var(--gray-400);font-size:12px;">โหลดไทม์ไลน์ไม่สำเร็จ</span>'; }
}

           <div style="font-size:11px;color:var(--gray-500);margin-top:4px;">แตะดาวเพื่อประเมินความพึงพอใจ</div>`}
      </div></div>` : ''}
    <div style="margin-top:16px;">
      <div style="font-weight:700;font-size:13px;margin-bottom:8px;">💬 การสนทนา</div>
      <div class="comment-thread" id="commentThread"><div class="loading-page"><span class="loading"></span></div></div>
      <div class="comment-input-row">
        <input type="text" class="form-control" id="commentInput" placeholder="พิมพ์ข้อความ..." onkeydown="if(event.key==='Enter')sendComment()">
        <button class="btn btn-primary" onclick="sendComment()">ส่ง</button>
      </div>
    </div>`;

  if (isAdmin) {
    setPendingStatus(t.status);
    document.getElementById('modalFooter').innerHTML = `
      <button class="btn btn-danger btn-sm" onclick="deleteCurrentTicket()" style="margin-right:auto;">🗑️ ลบ</button>
      <button class="btn btn-secondary" onclick="closeModal()">ปิด</button>
      <button class="btn btn-success" onclick="saveTicketChanges()">💾 บันทึก</button>`;
  } else {
    document.getElementById('modalFooter').innerHTML = `<button class="btn btn-secondary" onclick="closeModal()">ปิด</button>`;
  }
}

function setPendingStatus(s) {
  state.pendingStatus = s;
  document.querySelectorAll('.status-btn').forEach(b => b.classList.toggle('active', b.dataset.status === s));
}

async function loadComments() {
  const t = state.currentTicket;
  const r = await apiGet('getComments', { siteId: t._siteId, ticketId: t.ticketId });
  const el = document.getElementById('commentThread');
  if (!el) return;
  if (!r.ok) { el.innerHTML = '<div class="notif-empty">โหลดไม่สำเร็จ</div>'; return; }
  state.currentComments = r.comments;
  if (!r.comments.length) { el.innerHTML = '<div class="notif-empty">ยังไม่มีข้อความ — เริ่มสนทนาได้เลย</div>'; return; }
  const myName = state.user.isAdmin ? state.user.position : (t.reporterName || state.user.position);
  el.innerHTML = r.comments.map(c => {
    const isMine = String(c.by) === String(myName);
    const canDelete = isMine || state.user.isAdmin;
    return `
    <div class="comment-item ${c.role === 'admin' ? 'admin' : ''}" data-cid="${c.id}">
      <div class="comment-bubble">${escapeHtml(c.message)}</div>
      <div class="comment-meta">${c.role === 'admin' ? '🛠️' : '👤'} ${escapeHtml(c.by)} • ${escapeHtml(c.createdAt)}${c.editedAt ? ' • แก้ไขแล้ว' : ''}
        ${isMine ? `<button onclick="startEditComment('${c.id}')" style="background:none;border:none;color:var(--primary);cursor:pointer;font-size:10px;padding:0 4px;">แก้</button>` : ''}
        ${canDelete ? `<button onclick="doDeleteComment('${c.id}')" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:10px;padding:0;">ลบ</button>` : ''}
      </div>
    </div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

function startEditComment(cid) {
  const c = state.currentComments.find(x => x.id === cid);
  if (!c) return;
  const item = document.querySelector(`.comment-item[data-cid="${cid}"]`);
  if (!item) return;
  const bubble = item.querySelector('.comment-bubble');
  bubble.innerHTML = `<div style="display:flex;gap:6px;align-items:center;">
    <input type="text" class="form-control" id="editCmt_${cid}" value="${escapeHtml(c.message)}" style="font-size:13px;padding:6px 8px;">
    <button class="btn btn-primary btn-sm" onclick="saveEditComment('${cid}')">✓</button>
    <button class="btn btn-secondary btn-sm" onclick="loadComments()">✕</button>
  </div>`;
  const inp = document.getElementById('editCmt_' + cid);
  inp.focus();
  inp.onkeydown = (e) => { if (e.key === 'Enter') saveEditComment(cid); };
}

async function saveEditComment(cid) {
  const val = document.getElementById('editCmt_' + cid).value.trim();
  if (!val) return;
  const t = state.currentTicket;
  const myName = state.user.isAdmin ? state.user.position : (t.reporterName || state.user.position);
  const r = await apiPost('editComment', { siteId: t._siteId, commentId: cid, message: val, by: myName });
  if (r.ok) loadComments();
  else toast('แก้ไขไม่สำเร็จ', r.error, 'error');
}

async function doDeleteComment(cid) {
  if (!confirm('ลบข้อความนี้?')) return;
  const t = state.currentTicket;
  const myName = state.user.isAdmin ? state.user.position : (t.reporterName || state.user.position);
  const r = await apiPost('deleteComment', { siteId: t._siteId, commentId: cid, by: myName, adminKey: state.user.isAdmin ? state.user.adminKey : '' });
  if (r.ok) loadComments();
  else toast('ลบไม่สำเร็จ', r.error, 'error');
}

async function sendComment() {
  const input = document.getElementById('commentInput');
  const msg = input.value.trim();
  if (!msg) return;
  const t = state.currentTicket;
  input.disabled = true;
  const r = await apiPost('addComment', {
    siteId: t._siteId, ticketId: t.ticketId, message: msg,
    by: state.user.isAdmin ? state.user.position : (t.reporterName || state.user.position),
    role: state.user.isAdmin ? 'admin' : 'user'
  });
  input.disabled = false;
  if (r.ok) { input.value = ''; loadComments(); }
  else toast('ส่งไม่สำเร็จ', r.error, 'error');
}

async function submitRating(n) {
  const t = state.currentTicket;
  document.querySelectorAll('#rateStars span').forEach(s => s.classList.toggle('on', +s.dataset.n <= n));
  const r = await apiPost('rateTicket', { siteId: t._siteId, ticketId: t.ticketId, rating: n, by: t.reporterName });
  if (r.ok) { toast('ขอบคุณสำหรับคะแนน', '★'.repeat(n), 'success'); state.currentTicket.rating = n; renderTicketModal(); loadComments(); }
  else toast('ไม่สำเร็จ', r.error, 'error');
}

async function saveTicketChanges() {
  const t = state.currentTicket;
  const note = document.getElementById('modalAdminNote').value;
  const assignee = document.getElementById('modalAssignee').value.trim();
  const r = await apiPost('updateTicket', {
    siteId: t._siteId, adminKey: state.user.adminKey,
    ticketId: t.ticketId, status: state.pendingStatus,
    adminNote: note, assignedTo: assignee
  });
  if (r.ok) {
    toast('บันทึกแล้ว', r.archived ? 'Ticket ถูก Archive อัตโนมัติตามหมวดหมู่' : '', 'success');
    closeModal(true); loadAdminTickets();
  } else toast('บันทึกไม่สำเร็จ', r.error, 'error');
}

async function deleteCurrentTicket() {
  const t = state.currentTicket;
  if (!confirm('ลบ Ticket นี้?\n(จะไปอยู่ในถังขยะ Super Admin กู้คืนได้ 7 วัน)')) return;
  const r = await apiPost('deleteTicket', { siteId: t._siteId, adminKey: state.user.adminKey, ticketId: t.ticketId });
  if (r.ok) { toast('ลบแล้ว', 'อยู่ในถังขยะ 7 วัน', 'success'); closeModal(true); loadAdminTickets(); }
  else toast('ลบไม่สำเร็จ', r.error, 'error');
}

function closeModal(force) {
  if (!force && state.user && state.user.isAdmin && state.currentTicket) {
    const note = document.getElementById('modalAdminNote')?.value;
    const assignee = document.getElementById('modalAssignee')?.value;
    const changed = state.pendingStatus !== state.currentTicket.status ||
      (note !== undefined && note !== (state.currentTicket.adminNote||'')) ||
      (assignee !== undefined && assignee !== (state.currentTicket.assignedTo||''));
    if (changed && !confirm('มีการเปลี่ยนแปลงที่ยังไม่ได้บันทึก ปิดหรือไม่?')) return;
  }
  document.getElementById('ticketModal').classList.remove('show');
  state.currentTicket = null;
}

/* ═══════ ADMIN TICKETS + BULK ═══════ */
async function loadAdminTickets() {
  const c = document.getElementById('tab-allTickets');
  c.innerHTML = '<div class="loading-page"><span class="loading"></span> กำลังโหลด...</div>';
  const r = await apiGet('getAllTickets', { siteId: state.user.siteId });
  if (!r.ok) { c.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div></div>'; return; }
  state.tickets = r.tickets;
  state.selectedTickets.clear();
  state.highlightUnread = new Set(state.notifTickets.map(t => t.ticketId));
  renderAdminTickets();
}

function renderAdminTickets() {
  const c = document.getElementById('tab-allTickets');
  const depts = [...new Set(state.tickets.map(t => t.deptName))].filter(Boolean);
  const cats = [...new Set(state.tickets.map(t => t.category))].filter(Boolean);
  const busInUse = [...new Set(state.tickets.map(t => t.bu))].filter(Boolean);
  state.adminPage = 1;
  c.innerHTML = `
    <div class="filter-bar">
      <div class="form-group" style="flex:2;min-width:170px;"><label>🔍 ค้นหา</label>
        <input type="text" class="form-control" id="atSearch" placeholder="คำค้น..." oninput="onAdminFilterChange()"></div>
      <div class="form-group"><label>แผนก</label>
        <select class="form-control" id="atDept" onchange="onAdminFilterChange()"><option value="">ทั้งหมด</option>${depts.map(d => `<option>${escapeHtml(d)}</option>`).join('')}</select></div>
      ${busInUse.length ? `<div class="form-group"><label>🏷️ BU</label>
        <select class="form-control" id="atBU" onchange="onAdminFilterChange()"><option value="">ทั้งหมด</option>${busInUse.map(b => `<option>${escapeHtml(b)}</option>`).join('')}</select></div>` : ''}
      <div class="form-group"><label>หมวดหมู่</label>
        <select class="form-control" id="atCat" onchange="onAdminFilterChange()"><option value="">ทั้งหมด</option>${cats.map(x => `<option>${escapeHtml(x)}</option>`).join('')}</select></div>
      <div class="form-group"><label>สถานะ</label>
        <select class="form-control" id="atStatus" onchange="onAdminFilterChange()">
          <option value="">ทั้งหมด</option><option value="pending">รอดำเนินการ</option>
          <option value="inProgress">กำลังดำเนินการ</option><option value="resolved">แล้วเสร็จ</option></select></div>
      <div class="form-group"><label>เร่งด่วน</label>
        <select class="form-control" id="atPrio" onchange="onAdminFilterChange()">
          <option value="">ทั้งหมด</option><option value="urgent">เร่งด่วน</option>
          <option value="normal">ปกติ</option><option value="low">ไม่เร่งด่วน</option></select></div>
      <div class="form-group"><label>&nbsp;</label><button class="btn btn-secondary" onclick="loadAdminTickets()">🔄</button></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
      <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;">
        <input type="checkbox" id="selectAllChk" onchange="toggleSelectAll(this)" style="width:16px;height:16px;accent-color:var(--primary);"> เลือกทั้งหมดที่แสดง
      </label>
      <span id="listCount" style="font-size:12px;color:var(--gray-500);"></span>
    </div>
    <div class="ticket-list" id="adminTicketList"></div>
    <div id="adminPager" style="text-align:center;margin-top:12px;"></div>
    <div class="bulk-bar" id="bulkBar">
      <span>เลือก <strong id="bulkCount">0</strong> รายการ</span>
      <select id="bulkStatus">
        <option value="pending">⏳ รอดำเนินการ</option>
        <option value="inProgress">🔧 กำลังดำเนินการ</option>
        <option value="resolved">✅ แล้วเสร็จ</option>
      </select>
      <button class="btn btn-success btn-sm" onclick="applyBulkStatus()">เปลี่ยนสถานะ</button>
      <button class="btn btn-secondary btn-sm" onclick="clearSelection()">ยกเลิก</button>
    </div>`;
  renderAdminTicketsList();
}

function onAdminFilterChange() { state.adminPage = 1; renderAdminTicketsList(); }

function getFilteredAdminList() {
  const q = document.getElementById('atSearch')?.value.trim() || '';
  const fd = document.getElementById('atDept')?.value || '';
  const fb = document.getElementById('atBU')?.value || '';
  const fc = document.getElementById('atCat')?.value || '';
  const fs = document.getElementById('atStatus')?.value || '';
  const fp = document.getElementById('atPrio')?.value || '';
  let list = state.tickets;
  if (fd) list = list.filter(t => t.deptName === fd);
  if (fb) list = list.filter(t => t.bu === fb);
  if (fc) list = list.filter(t => t.category === fc);
  if (fs) list = list.filter(t => t.status === fs);
  if (fp) list = list.filter(t => t.priority === fp);
  return list.filter(t => ticketMatchesSearch(t, q));
}

const ADMIN_PAGE_SIZE = 50;
function renderAdminTicketsList() {
  const list = getFilteredAdminList();
  const c = document.getElementById('adminTicketList');
  document.getElementById('listCount').textContent = 'พบ ' + list.length + ' รายการ';
  if (!list.length) { c.innerHTML = '<div class="empty-state"><div class="title">ไม่มี Ticket ตรงเงื่อนไข</div></div>'; document.getElementById('adminPager').innerHTML = ''; return; }
  const page = state.adminPage || 1;
  const shown = list.slice(0, page * ADMIN_PAGE_SIZE);
  c.innerHTML = shown.map(t => ticketCardHTML(t, { selectable: true, highlight: state.highlightUnread.has(t.ticketId) })).join('');
  const pager = document.getElementById('adminPager');
  if (shown.length < list.length) {
    pager.innerHTML = `<button class="btn btn-secondary" onclick="loadMoreAdmin()">โหลดเพิ่ม (${shown.length}/${list.length})</button>`;
  } else {
    pager.innerHTML = list.length > ADMIN_PAGE_SIZE ? `<span style="font-size:12px;color:var(--gray-400);">แสดงครบ ${list.length} รายการ</span>` : '';
  }
}
function loadMoreAdmin() { state.adminPage = (state.adminPage || 1) + 1; renderAdminTicketsList(); }

function toggleSelect(id, chk) {
  if (chk.checked) state.selectedTickets.add(id);
  else state.selectedTickets.delete(id);
  updateBulkBar();
}
function toggleSelectAll(chk) {
  const list = getFilteredAdminList();
  if (chk.checked) list.forEach(t => state.selectedTickets.add(t.ticketId));
  else state.selectedTickets.clear();
  document.querySelectorAll('.ticket-check').forEach(c => c.checked = state.selectedTickets.has(c.dataset.tid));
  updateBulkBar();
}
function clearSelection() {
  state.selectedTickets.clear();
  document.querySelectorAll('.ticket-check').forEach(c => c.checked = false);
  const sa = document.getElementById('selectAllChk');
  if (sa) sa.checked = false;
  updateBulkBar();
}
function updateBulkBar() {
  const bar = document.getElementById('bulkBar');
  if (!bar) return;
  document.getElementById('bulkCount').textContent = state.selectedTickets.size;
  bar.classList.toggle('show', state.selectedTickets.size > 0);
}
async function applyBulkStatus() {
  const status = document.getElementById('bulkStatus').value;
  const ids = Array.from(state.selectedTickets);
  if (!ids.length) return;
  if (!confirm('เปลี่ยนสถานะ ' + ids.length + ' รายการ เป็น "' + statusText(status) + '"?')) return;
  const r = await apiPost('bulkUpdateStatus', { siteId: state.user.siteId, adminKey: state.user.adminKey, ticketIds: ids, status });
  if (r.ok) { toast('เปลี่ยนสถานะแล้ว', r.count + ' รายการ', 'success'); clearSelection(); loadAdminTickets(); }
  else toast('ไม่สำเร็จ', r.error, 'error');
}


/* ═══════ DASHBOARD (multi-site) ═══════ */
let charts = {};
async function loadDashboard() {
  const c = document.getElementById('tab-dashboard');
  const chips = state.sites.map(s => `
    <button class="site-chip ${state.dashSites.has(s.id) ? 'on' : ''}" onclick="toggleDashSite('${s.id}')">
      <span class="chk">${state.dashSites.has(s.id) ? '✓' : ''}</span> ${escapeHtml(s.id)}
    </button>`).join('');
  c.innerHTML = `
    <div class="site-chips">${chips}</div>
    <div class="filter-bar">
      <div class="form-group"><label>วันที่เริ่ม</label><input type="date" id="dashFrom" class="form-control" value="${state.filters.from||''}"></div>
      <div class="form-group"><label>ถึงวันที่</label><input type="date" id="dashTo" class="form-control" value="${state.filters.to||''}"></div>
      <div class="form-group"><label>&nbsp;</label><button class="btn btn-primary" onclick="applyDashFilter()">🔍 ค้นหา</button></div>
      <div class="form-group"><label>&nbsp;</label><button class="btn btn-secondary" onclick="resetDashFilter()">รีเซ็ต</button></div>
    </div>
    <div id="dashBody"><div class="loading-page"><span class="loading"></span> กำลังโหลด Dashboard...</div></div>`;
  await renderDashboardData();
}

function toggleDashSite(id) {
  if (state.dashSites.has(id)) {
    if (state.dashSites.size === 1) { toast('ต้องเลือกอย่างน้อย 1 site', '', 'warning'); return; }
    state.dashSites.delete(id);
  } else state.dashSites.add(id);
  loadDashboard();
}
function applyDashFilter() {
  state.filters.from = document.getElementById('dashFrom').value;
  state.filters.to = document.getElementById('dashTo').value;
  renderDashboardData();
}
function resetDashFilter() { state.filters = {}; loadDashboard(); }

async function renderDashboardData() {
  const body = document.getElementById('dashBody');
  body.innerHTML = '<div class="loading-page"><span class="loading"></span> กำลังโหลด...</div>';
  const siteIds = Array.from(state.dashSites);
  const r = await apiGet('getAnalytics', { siteIds: siteIds.join(','), from: state.filters.from, to: state.filters.to });
  if (!r.ok) { body.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><div class="title">โหลดไม่สำเร็จ</div></div>'; return; }
  const s = r.combined;
  const multi = siteIds.length > 1;
  const avgRating = s.ratingCount ? (s.ratingSum / s.ratingCount).toFixed(1) : '-';
  const avgResolveHrs = s.resolveTimeCount ? (s.resolveTimeSum / s.resolveTimeCount / 3600000) : null;
  const buKeys = Object.keys(s.byBU || {});
  const showBU = buKeys.length > 1;

  const perSiteRow = multi ? `
    <div class="card" style="margin-bottom:14px;">
      <div class="card-title">🏭 แยกตาม Site</div>
      <div class="dept-table"><table>
        <thead><tr><th>Site</th><th style="text-align:right;">รวม</th><th style="text-align:right;">รอ</th><th style="text-align:right;">กำลังทำ</th><th style="text-align:right;">เสร็จ</th><th style="text-align:right;">⭐ เฉลี่ย</th></tr></thead>
        <tbody>${siteIds.map(sid => {
          const x = r.sites[sid] || {};
          if (x.error) return `<tr><td>${sid}</td><td colspan="5" style="color:var(--danger);">${escapeHtml(x.error)}</td></tr>`;
          const ar = x.ratingCount ? (x.ratingSum/x.ratingCount).toFixed(1) : '-';
          return `<tr><td><strong>${sid}</strong></td><td style="text-align:right;">${x.total}</td><td style="text-align:right;">${x.pending}</td><td style="text-align:right;">${x.inProgress}</td><td style="text-align:right;">${x.resolved}</td><td style="text-align:right;">${ar}</td></tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>` : '';

  body.innerHTML = `
    <div class="stat-grid">
      <div class="stat-card total"><div class="stat-label">รวม${multi ? ' (' + siteIds.join('+') + ')' : ''}</div><div class="stat-value">${s.total}</div></div>
      <div class="stat-card pending"><div class="stat-label">รอดำเนินการ</div><div class="stat-value">${s.pending}</div></div>
      <div class="stat-card inProgress"><div class="stat-label">กำลังดำเนินการ</div><div class="stat-value">${s.inProgress}</div></div>
      <div class="stat-card resolved"><div class="stat-label">แล้วเสร็จ</div><div class="stat-value">${s.resolved}</div></div>
      <div class="stat-card rating"><div class="stat-label">⭐ ความพึงพอใจ</div><div class="stat-value">${avgRating}</div><div class="stat-sub">${s.ratingCount} รีวิว</div></div>
      ${avgResolveHrs != null ? `<div class="stat-card inProgress"><div class="stat-label">⏱️ เวลาแก้เฉลี่ย</div><div class="stat-value" style="font-size:20px;">${fmtDuration(Math.round(avgResolveHrs*10)/10)}</div><div class="stat-sub">${s.resolveTimeCount} งานที่ปิด</div></div>` : ''}
    </div>
    ${perSiteRow}
    ${showBU ? `
    <div class="card" style="margin-bottom:14px;">
      <div class="card-title">🏷️ แยกตาม BU</div>
      <div class="dept-table"><table>
        <thead><tr><th>BU</th><th style="text-align:right;">จำนวน Ticket</th><th style="text-align:right;">สัดส่วน</th></tr></thead>
        <tbody>${buKeys.sort((a,b) => s.byBU[b]-s.byBU[a]).map(bu => `
          <tr><td><strong>${escapeHtml(bu)}</strong></td><td style="text-align:right;">${s.byBU[bu]}</td>

    <div class="chart-card"><h3>🔝 Top 10 หมวดย่อย</h3><div class="chart-container tall"><canvas id="chSub"></canvas></div></div>`;

function renderCharts(r, siteIds, multi) {
  const colors = ['#2563eb','#10b981','#f59e0b','#ef4444','#06b6d4','#8b5cf6','#ec4899','#84cc16'];
  Object.values(charts).forEach(ch => { try { ch.destroy(); } catch(e){} });
  charts = {};
  const s = r.combined;

  // Category — ถ้าหลาย site ทำเป็น stacked แยกสี site
  const catLabels = Object.keys(s.byCategory);
  let catDatasets;
  if (multi) {
    catDatasets = siteIds.map((sid, i) => ({
      label: sid,
      data: catLabels.map(c => (r.sites[sid] && r.sites[sid].byCategory ? r.sites[sid].byCategory[c] : 0) || 0),
      backgroundColor: colors[i % colors.length], borderRadius: 4
    }));
  } else {
    catDatasets = [{ label:'จำนวน', data: catLabels.map(c => s.byCategory[c]), backgroundColor: colors.slice(0, catLabels.length), borderRadius: 6 }];
  }
  charts.cat = new Chart(document.getElementById('chCat'), {
    type: 'bar', data: { labels: catLabels, datasets: catDatasets },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display: multi } },
      scales: { x:{ stacked: multi }, y:{ stacked: multi, beginAtZero:true, ticks:{ precision:0 } } } }
  });

  const dLabels = Object.keys(s.byDept);
  charts.dept = new Chart(document.getElementById('chDept'), {
    type:'doughnut', data:{ labels: dLabels, datasets:[{ data: dLabels.map(k => s.byDept[k]), backgroundColor: colors }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'right' } } }
  });

  // BU chart (ถ้ามีมากกว่า 1 BU)
  const buCanvas = document.getElementById('chBU');
  if (buCanvas && s.byBU) {
    const buLabels = Object.keys(s.byBU).sort((a,b) => s.byBU[b]-s.byBU[a]);
    charts.bu = new Chart(buCanvas, {
      type:'bar', data:{ labels: buLabels, datasets:[{ label:'จำนวน', data: buLabels.map(k => s.byBU[k]), backgroundColor: colors, borderRadius:6 }] },
      options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false } }, scales:{ y:{ beginAtZero:true, ticks:{ precision:0 } } } }
    });
  }

  const tLabels = Object.keys(s.timeline).sort();
  let timeDatasets;
  if (multi) {
    timeDatasets = siteIds.map((sid, i) => ({
      label: sid, data: tLabels.map(m => (r.sites[sid] && r.sites[sid].timeline ? r.sites[sid].timeline[m] : 0) || 0),
      borderColor: colors[i % colors.length], backgroundColor: 'transparent', tension:.3
    }));
  } else {
    timeDatasets = [{ label:'จำนวน', data: tLabels.map(k => s.timeline[k]), borderColor:'#2563eb', backgroundColor:'rgba(37,99,235,.1)', tension:.3, fill:true }];
  }
  charts.time = new Chart(document.getElementById('chTime'), {
    type:'line', data:{ labels: tLabels, datasets: timeDatasets },
    options:{ responsive:true, maintainAspectRatio:false, scales:{ y:{ beginAtZero:true, ticks:{ precision:0 } } } }
  });

  const subItems = Object.entries(s.bySubCategory).sort((a,b) => b[1]-a[1]).slice(0,10);
  charts.sub = new Chart(document.getElementById('chSub'), {
    type:'bar', data:{ labels: subItems.map(x => x[0]), datasets:[{ data: subItems.map(x => x[1]), backgroundColor:'#10b981', borderRadius:6 }] },
    options:{ indexAxis:'y', responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false } }, scales:{ x:{ beginAtZero:true, ticks:{ precision:0 } } } }
  });
}

function getExportFiltered() {
  const fd = document.getElementById('expDept').value;
  const ff = document.getElementById('expFrom').value;
  const ft = document.getElementById('expTo').value;
  let list = [...state.tickets];
  if (fd) list = list.filter(t => t.deptName === fd);
  if (ff) list = list.filter(t => String(t.createdAt) >= ff);
  if (ft) list = list.filter(t => String(t.createdAt) <= ft + ' 23:59:59');
  return { list, filterText: [fd && ('แผนก: '+fd), (ff||ft) && ('วันที่: '+(ff||'...')+' ถึง '+(ft||'...'))].filter(Boolean).join(' | ') || 'ทั้งหมด' };
}

function previewExport() {
  const { list, filterText } = getExportFiltered();
  const el = document.getElementById('exportPreview');
  el.style.display = 'block';
  el.innerHTML = `<strong>พบ ${list.length} Ticket</strong><div style="color:var(--gray-600);margin-top:4px;">ตัวกรอง: ${escapeHtml(filterText)}</div>
    <hr style="margin:8px 0;border:none;border-top:1px solid var(--gray-200);">
    ${list.slice(0,5).map(t => `<div style="padding:3px 0;">• ${escapeHtml(t.ticketId)} — ${escapeHtml(t.title)}</div>`).join('')}
    ${list.length > 5 ? `<div style="color:var(--gray-500);margin-top:4px;">... และอีก ${list.length-5} รายการ</div>` : ''}`;
  document.getElementById('exportButtons').style.display = 'flex';
}

function doExportExcel() {
  const { list, filterText } = getExportFiltered();
  if (!list.length) { toast('ไม่มีข้อมูล', '', 'warning'); return; }
  const headers = ['TicketID','วันที่แจ้ง','สถานะ','ความเร่งด่วน','BU','แผนก','หมวดหมู่','หมวดย่อย','ชื่อปัญหา','รายละเอียด','ผู้แจ้ง','เบอร์โทร','ผู้รับผิดชอบ','หมายเหตุ Admin','เริ่มทำ','ปิดงาน','เวลาแก้(ชม.)','คะแนน'];
  const rows = list.map(t => [
    t.ticketId, t.createdAt, statusText(t.status), prioText(t.priority).replace(/[🔴🟡🟢]/g,'').trim(),
    t.bu, t.deptName, t.category, t.subCategory, t.title, t.description,
    t.reporterName, t.phone, t.assignedTo, t.adminNote,
    t.startedAt, t.resolvedAt, t.resolveDurationHrs, t.rating
  ]);
  // สร้างไฟล์ .xls แบบ HTML table (Excel เปิดได้ รองรับ UTF-8 ไทย)
  let table = '<table border="1"><thead><tr>' + headers.map(h => `<th style="background:#2563eb;color:#fff;">${escapeHtml(h)}</th>`).join('') + '</tr></thead><tbody>';
  rows.forEach(r => {
    table += '<tr>' + r.map(c => `<td>${escapeHtml(String(c==null?'':c))}</td>`).join('') + '</tr>';
  });
  table += '</tbody></table>';
  const html = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
    <head><meta charset="UTF-8"><!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet><x:Name>Tickets</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]--></head>
    <body><h3>${escapeHtml(state.user.siteName)} — Ticket Report (${escapeHtml(filterText)})</h3>${table}</body></html>`;
  const blob = new Blob(['\ufeff' + html], { type: 'application/vnd.ms-excel;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'Ticket_' + state.user.siteId + '_' + new Date().toISOString().slice(0,10) + '.xls';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Export Excel เสร็จแล้ว', list.length + ' รายการ', 'success');
}

function doExportPDF(mode) {
  const { list, filterText } = getExportFiltered();
  if (!list.length) { toast('ไม่มีข้อมูล', '', 'warning'); return; }
  const html = mode === 'detail' ? renderDetailPDF(list, filterText) : renderSummaryPDF(list, filterText);
  const el = document.createElement('div');
  el.innerHTML = html;
  el.style.fontFamily = 'Sarabun, sans-serif';
  document.body.appendChild(el);
  toast('กำลังสร้าง PDF', 'รอสักครู่...', 'info');
  html2pdf().set({
    margin: 8, filename: 'Ticket_' + state.user.siteId + '_' + new Date().toISOString().slice(0,10) + '.pdf',
    image: { type:'jpeg', quality:.95 }, html2canvas: { scale:2, useCORS:true },
    jsPDF: { unit:'mm', format:'a4', orientation: mode === 'summary' ? 'landscape' : 'portrait' }
  }).from(el).save().then(() => { document.body.removeChild(el); toast('PDF เสร็จแล้ว', '', 'success'); });
}

    ${list.map((t,i) => `
      <div style="border:1px solid #ddd;border-radius:6px;padding:9px;margin-bottom:8px;page-break-inside:avoid;">
        <div style="display:flex;justify-content:space-between;"><strong style="font-size:12px;">${i+1}. ${escapeHtml(t.title)}</strong><span style="font-size:9px;">[${t.ticketId}]</span></div>
