          <tr><td style="width:80px;color:#666;padding:2px;">แผนก:</td><td>${escapeHtml(t.deptName)}</td><td style="width:80px;color:#666;">BU:</td><td>${escapeHtml(t.bu||'-')}</td></tr>
          <tr><td style="color:#666;padding:2px;">หมวด:</td><td>${escapeHtml(t.category)} → ${escapeHtml(t.subCategory)}</td><td style="color:#666;">สถานะ:</td><td>${statusText(t.status)}</td></tr>
          <tr><td style="color:#666;padding:2px;">ผู้แจ้ง:</td><td>${escapeHtml(t.reporterName)} ${t.phone ? '📞'+escapeHtml(t.phone) : ''}</td><td style="color:#666;">เวลา:</td><td>${escapeHtml(String(t.createdAt))}</td></tr>
          ${t.assignedTo ? `<tr><td style="color:#666;padding:2px;">ผู้รับผิดชอบ:</td><td colspan="3">${escapeHtml(t.assignedTo)}</td></tr>` : ''}
        </table>
        <div style="margin-top:4px;padding-top:4px;border-top:1px dashed #ddd;">${escapeHtml(t.description)}</div>
        ${t.adminNote ? `<div style="margin-top:4px;padding:5px;background:#fef3c7;border-radius:4px;font-size:9px;"><strong>Admin:</strong> ${escapeHtml(t.adminNote)}</div>` : ''}
      </div>`).join('')}
  </div>`;
}

function renderSummaryPDF(list, filterText) {
  const grouped = {};
  list.forEach(t => {
    if (!grouped[t.deptName]) grouped[t.deptName] = [];
    grouped[t.deptName].push(t);
  });
  const st = { total:list.length, p:list.filter(t=>t.status==='pending').length, i:list.filter(t=>t.status==='inProgress').length, r:list.filter(t=>t.status==='resolved').length };
  let html = `<div style="padding:12px;font-size:9px;">
    <h1 style="text-align:center;font-size:15px;margin-bottom:3px;">${escapeHtml(state.user.siteName)} — สรุป Ticket</h1>
    <div style="text-align:center;color:#666;margin-bottom:10px;font-size:8px;">${escapeHtml(filterText)} | ${new Date().toLocaleString('th-TH')}</div>
    <div style="display:flex;justify-content:space-around;background:#f3f4f6;padding:6px;border-radius:6px;margin-bottom:10px;">
      <div><strong>รวม:</strong> ${st.total}</div><div><strong>รอ:</strong> ${st.p}</div><div><strong>กำลังทำ:</strong> ${st.i}</div><div><strong>เสร็จ:</strong> ${st.r}</div>
    </div>`;
  Object.keys(grouped).forEach(dept => {
    html += `<h3 style="background:#2563eb;color:#fff;padding:5px;border-radius:4px;margin-top:8px;font-size:11px;">🏢 ${escapeHtml(dept)} (${grouped[dept].length})</h3>
      <table style="width:100%;border-collapse:collapse;font-size:8px;margin-top:4px;">
      <thead><tr style="background:#e5e7eb;"><th style="padding:3px;border:1px solid #ccc;">ID</th><th style="padding:3px;border:1px solid #ccc;text-align:left;">ปัญหา</th><th style="padding:3px;border:1px solid #ccc;">BU</th><th style="padding:3px;border:1px solid #ccc;">หมวด</th><th style="padding:3px;border:1px solid #ccc;">ผู้แจ้ง</th><th style="padding:3px;border:1px solid #ccc;">สถานะ</th><th style="padding:3px;border:1px solid #ccc;">วันที่</th></tr></thead><tbody>`;
    grouped[dept].forEach(t => {
      html += `<tr><td style="padding:3px;border:1px solid #ccc;">${t.ticketId}</td><td style="padding:3px;border:1px solid #ccc;">${escapeHtml(t.title)}</td><td style="padding:3px;border:1px solid #ccc;">${escapeHtml(t.bu||'-')}</td><td style="padding:3px;border:1px solid #ccc;">${escapeHtml(t.subCategory)}</td><td style="padding:3px;border:1px solid #ccc;">${escapeHtml(t.reporterName)}</td><td style="padding:3px;border:1px solid #ccc;">${statusText(t.status)}</td><td style="padding:3px;border:1px solid #ccc;">${escapeHtml(String(t.createdAt).substring(0,10))}</td></tr>`;
    });
    html += '</tbody></table>';
  });
  return html + '</div>';
}

async function loadDeptMgmt() {
  const c = document.getElementById('managePanelBody');

  const r = await apiGet('getDepts', { siteId: state.user.siteId });
  if (!r.ok) { c.innerHTML = '<div class="empty-state"><div class="title">โหลดไม่สำเร็จ</div></div>'; return; }
  state.depts = r.departments;
  c.innerHTML = `

      <div class="card-title">➕ เพิ่มแผนก</div>

        <input type="number" id="newDeptQuota" class="form-control" value="100" style="width:110px;" title="Quota">
        <button class="btn btn-primary" onclick="addNewDept()">เพิ่ม</button>
      </div>
    </div>
    <div class="dept-table"><table>
      <thead><tr><th>ID</th><th>ชื่อแผนก</th><th>Quota</th><th>การกระทำ</th></tr></thead>

      </tbody></table></div>`;
}
async function addNewDept() {
  const name = document.getElementById('newDeptName').value.trim();
  const quota = parseInt(document.getElementById('newDeptQuota').value) || 100;
  if (!name) { toast('กรอกชื่อแผนก', '', 'warning'); return; }
  const r = await apiPost('manageDept', { siteId: state.user.siteId, adminKey: state.user.adminKey, subAction:'add', name, quota });
  if (r.ok) { toast('เพิ่มแล้ว', '', 'success'); loadDeptMgmt(); } else toast('ไม่สำเร็จ', r.error, 'error');
}
async function toggleDept(deptId) {
  const r = await apiPost('manageDept', { siteId: state.user.siteId, adminKey: state.user.adminKey, subAction:'toggle', deptId });
  if (r.ok) { toast('อัปเดตแล้ว', '', 'success'); loadDeptMgmt(); } else toast('ไม่สำเร็จ', r.error, 'error');
}
async function updateQuota(deptId) {
  const quota = parseInt(document.getElementById('q_' + deptId).value);
  if (!quota || quota < 1) { toast('Quota ต้องมากกว่า 0', '', 'warning'); return; }
  const r = await apiPost('manageDept', { siteId: state.user.siteId, adminKey: state.user.adminKey, subAction:'setQuota', deptId, quota });
  if (r.ok) toast('บันทึกแล้ว', '', 'success'); else toast('ไม่สำเร็จ', r.error, 'error');
}

function copyPassword(id) {
  const p = state.allPositions.find(x => x.id === id);
  if (!p) return;
  navigator.clipboard.writeText(p.password).then(() => toast('คัดลอกแล้ว', p.name, 'success'))
    .catch(() => prompt('คัดลอกรหัสผ่าน:', p.password));
}
function genPassword(hint) {
  let prefix = 'Px';
  if (hint && hint.trim()) {
    prefix = hint.trim().split(/\s+/).map(w => w[0]).join('').substring(0,3);
    prefix = prefix.charAt(0).toUpperCase() + prefix.slice(1).toLowerCase();
  }
  return prefix + Math.floor(1000 + Math.random()*9000);
}

  const r = await apiPost('managePosition', { siteId: state.user.siteId, adminKey: state.user.adminKey, subAction:'add', deptId, name, password });
  if (r.ok) { toast('เพิ่มแล้ว', name + ' — รหัส: ' + password, 'success'); document.getElementById('newPosName').value=''; document.getElementById('newPosPassword').value=''; loadPositionMgmt(); }

}
async function togglePosition(id) {
  const p = state.allPositions.find(x => x.id === id);
  if (!p || !confirm((p.active?'ปิด':'เปิด') + 'ใช้งาน "' + p.name + '"?')) return;
  const r = await apiPost('managePosition', { siteId: state.user.siteId, adminKey: state.user.adminKey, subAction:'toggle', positionId: id });

async function resetPositionPassword(id) {
  const p = state.allPositions.find(x => x.id === id);
  if (!p) return;
  const suggested = genPassword(p.name);
  const newPassword = prompt('Reset รหัสผ่านของ "' + p.name + '"\nกรอกรหัสใหม่:', suggested);
  if (newPassword === null) return;
  if (!newPassword || newPassword.length < 4) { toast('รหัสสั้นไป', 'อย่างน้อย 4 ตัว', 'warning'); return; }
  const r = await apiPost('adminResetPassword', { siteId: state.user.siteId, adminKey: state.user.adminKey, positionId: id, newPassword });
  if (r.ok) {
    toast('Reset สำเร็จ', p.name + ' → ' + newPassword, 'success');
    if (p.isAdmin) { state.user.adminKey = newPassword; saveSession(); }
    loadPositionMgmt();
  } else toast('ไม่สำเร็จ', r.error, 'error');
}

function exportArchiveCSV() {
  const headers = ['TicketID','DeptName','BU','Category','SubCategory','Title','Status','Priority','Reporter','Phone','AssignedTo','Rating','CreatedAt','ArchivedAt'];
  const rows = state.archiveTickets.map(t => [t.ticketId,t.deptName,t.bu,t.category,t.subCategory,t.title,t.status,t.priority,t.reporterName,t.phone,t.assignedTo,t.rating,t.createdAt,t.archivedAt]);
  const csv = '\ufeff' + [headers,...rows].map(r => r.map(c => '"' + String(c||'').replace(/"/g,'""') + '"').join(',')).join('\n');
  const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'Archive_' + state.user.siteId + '_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

function filterLog() {
  const q = document.getElementById('logSearch').value.trim().toLowerCase();
  const rows = (state._logs || []).filter(l =>
    !q || (l.timestamp + ' ' + l.siteId + ' ' + l.action + ' ' + l.by + ' ' + l.detail).toLowerCase().includes(q));
  document.getElementById('logTableBody').innerHTML = rows.map(l => `
    <tr><td style="white-space:nowrap;font-size:11px;">${escapeHtml(l.timestamp)}</td>
    <td><code>${escapeHtml(l.siteId)}</code></td>
    <td style="white-space:nowrap;">${state._actionLabel[l.action] || escapeHtml(l.action)}</td>
    <td>${escapeHtml(l.by)}</td><td style="font-size:11px;">${escapeHtml(l.detail)}</td></tr>`).join('');

function exportLogCSV() {
  const headers = ['Timestamp','SiteID','Action','By','Detail'];
  const rows = (state._logs || []).map(l => [l.timestamp,l.siteId,l.action,l.by,l.detail]);
  const csv = '\ufeff' + [headers,...rows].map(r => r.map(c => '"' + String(c||'').replace(/"/g,'""') + '"').join(',')).join('\n');
  const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'AuditLog_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}


/* ═══════ POLLING + NOTIFICATION ═══════ */
function startAdminPoll() {
  const readKey = 'tk_read_' + state.user.siteId;
  state.readTicketIds = loadReadIds(readKey);
  if (state.pollTimer) clearInterval(state.pollTimer);
  const poll = async () => {
    try {
      const r = await apiGet('pollAdmin', { siteId: state.user.siteId });
      if (!r.ok) return;
      processAdminPoll(r.tickets, readKey);
    } catch(e) {}
  };
  state.pollNow = poll;
  poll();
  startAdaptivePoll(poll, 30000);
}

/* polling อัจฉริยะ: ใช้ interval ปกติเมื่อ active, ยืดเป็น 3 เท่าเมื่อไม่ได้แตะเกิน 3 นาที
   หรือแท็บถูกซ่อน → ลด load server โดยไม่กระทบการแจ้งเตือนตอนใช้งานจริง */
function startAdaptivePoll(pollFn, baseMs) {
  if (state.pollTimer) clearInterval(state.pollTimer);
  let lastRun = Date.now();
  state.pollTimer = setInterval(() => {
    const idleMs = Date.now() - lastActivity;
    const hidden = document.hidden;
    // ถ้าไม่ active (เกิน 3 นาที) หรือแท็บซ่อน → poll ทุก baseMs*3
    const effectiveInterval = (hidden || idleMs > 180000) ? baseMs * 3 : baseMs;
    if (Date.now() - lastRun >= effectiveInterval) {
      lastRun = Date.now();
      pollFn();
    }
  }, Math.min(baseMs, 15000)); // ตรวจทุก 15 วิ หรือ baseMs (อันไหนน้อยกว่า)
}

function updateTabTicketStat(tickets) {
  const el = document.getElementById('tabTicketStat');
  if (!el) return;
  let p = 0, i = 0;
  tickets.forEach(t => { if (t.status === 'pending') p++; else if (t.status === 'inProgress') i++; });
  const parts = [];
  if (p > 0) parts.push(`<span style="color:#92400e;">รอ ${p}</span>`);
  if (i > 0) parts.push(`<span style="color:#1e40af;">ทำ ${i}</span>`);
  el.innerHTML = parts.length ? '(' + parts.join(' | ') + ')' : '';
}

function processAdminPoll(tickets, readKey) {
  const newNotifs = [];
  const prevSnapshot = state.knownSnapshot;
  const nextSnapshot = {};

  tickets.forEach(t => {
    nextSnapshot[t.ticketId] = { status: t.status, updatedAt: t.updatedAt, commentCount: t.commentCount };
    const prev = prevSnapshot[t.ticketId];
    const isRead = state.readTicketIds.has(t.ticketId);
    if (!state.primed) return;
    if (!prev) {
      // ticket ใหม่
      newNotifs.push({ ticketId: t.ticketId, title: t.title, type:'new', priority: t.priority, deptName: t.deptName, updatedAt: t.updatedAt });
    } else {
      // comment ใหม่
      if (t.commentCount > (prev.commentCount || 0)) {
        newNotifs.push({ ticketId: t.ticketId, title: t.title, type:'comment', deptName: t.deptName, updatedAt: t.updatedAt });
      }
    }
  });

  state.knownSnapshot = nextSnapshot;

  // อัปเดตตัวเลขสถานะบนแท็บ Tickets (ทุก poll)
  updateTabTicketStat(tickets);

  if (!state.primed) { state.primed = true; return; }

  if (newNotifs.length) {
    newNotifs.forEach(n => {
      if (!state.notifTickets.some(x => x.ticketId === n.ticketId && x.type === n.type)) {
        state.notifTickets.unshift(n);
      }
      state.highlightUnread.add(n.ticketId);
    });
    state.notifTickets = state.notifTickets.slice(0, 40);
    playDing();
    const first = newNotifs[0];
    const label = first.type === 'comment' ? '💬 มีความคิดเห็นใหม่' : (first.priority === 'urgent' ? '🔴 Ticket เร่งด่วนใหม่!' : '🔔 Ticket ใหม่');
    toast(label, first.title + (newNotifs.length > 1 ? ' และอีก ' + (newNotifs.length-1) : ''), first.priority === 'urgent' ? 'error' : 'info',
      () => { switchTabTo('allTickets'); openTicketDetail(first.ticketId); });
    updateBellBadge();
    updateNotifList();
    // refresh ตาราง ถ้ากำลังดูแท็บ Tickets
    if (state.currentTab === 'allTickets') loadAdminTickets();
  }
}

function startUserPoll() {
  const readKey = 'tk_uread_' + state.user.siteId + '_' + state.user.deptId;
  state.readTicketIds = loadReadIds(readKey);
  if (state.pollTimer) clearInterval(state.pollTimer);
  const poll = async () => {
    try {
      const r = await apiGet('pollUser', { siteId: state.user.siteId, deptId: state.user.deptId });
      if (!r.ok) return;
      processUserPoll(r.tickets);
    } catch(e) {}
  };
  state.pollNow = poll;
  poll();
  startAdaptivePoll(poll, 60000);
}

function processUserPoll(tickets) {
  const prevSnapshot = state.knownSnapshot;
  const nextSnapshot = {};
  const updates = [];
  tickets.forEach(t => {
    nextSnapshot[t.ticketId] = { status: t.status, updatedAt: t.updatedAt, commentCount: t.commentCount };
    const prev = prevSnapshot[t.ticketId];
    if (!state.primed || !prev) return;
    if (t.status !== prev.status) {
      updates.push({ ticketId: t.ticketId, title: t.title, type:'status', status: t.status });
    } else if (t.commentCount > (prev.commentCount || 0)) {
      updates.push({ ticketId: t.ticketId, title: t.title, type:'comment' });
    }
  });
  state.knownSnapshot = nextSnapshot;
  if (!state.primed) { state.primed = true; return; }
  if (updates.length) {
    updates.forEach(u => state.updatedTicketIds.add(u.ticketId));
    playDing();
    const u = updates[0];
    const msg = u.type === 'status' ? 'สถานะเปลี่ยนเป็น "' + statusText(u.status) + '"' : 'IT ตอบกลับแล้ว 💬';
    toast('🔔 อัปเดต Ticket', u.title + ' — ' + msg, 'info', () => switchTabTo('myTickets'));
    updateUserBadge();
    if (state.currentTab === 'myTickets') loadMyTickets();
  }
}

function switchTabTo(tab) {
  const btn = document.querySelector('.tab[data-tab="' + tab + '"]');
  if (btn) btn.click();
}

function updateBellBadge() {
  const unread = state.notifTickets.length;
  const badge = document.getElementById('bellBadge');
  if (!badge) return;
  if (unread > 0) { badge.style.display = 'flex'; badge.textContent = unread > 99 ? '99+' : unread; }
  else badge.style.display = 'none';
}

function updateNotifList() {
  const list = document.getElementById('notifList');
  if (!list) return;
  if (!state.notifTickets.length) { list.innerHTML = '<div class="notif-empty">ไม่มีการแจ้งเตือนใหม่</div>'; return; }
  list.innerHTML = state.notifTickets.map(n => `
    <div class="notif-item" onclick="notifClick('${n.ticketId}')">
      <div class="notif-title">${n.type === 'comment' ? '💬' : (n.priority === 'urgent' ? '🔴' : '🎫')} ${escapeHtml(n.title)}</div>
      <div class="notif-meta">${n.type === 'comment' ? 'ความคิดเห็นใหม่' : 'Ticket ใหม่'} ${n.deptName ? '• ' + escapeHtml(n.deptName) : ''} • ${escapeHtml(String(n.updatedAt||''))}</div>
    </div>`).join('');
}

function notifClick(ticketId) {
  document.getElementById('notifDropdown').classList.remove('show');
  markTicketRead(ticketId);
  if (state.currentTab !== 'allTickets') switchTabTo('allTickets');
  openTicketDetail(ticketId);
}

function toggleNotifDropdown() {
  const d = document.getElementById('notifDropdown');
  d.classList.toggle('show');
  if (d.classList.contains('show')) updateNotifList();
}

function markTicketRead(ticketId) {
  const readKey = 'tk_read_' + state.user.siteId;
  state.readTicketIds.add(ticketId);
  saveReadIds(readKey, state.readTicketIds);
  state.notifTickets = state.notifTickets.filter(n => n.ticketId !== ticketId);
  state.highlightUnread.delete(ticketId);
  updateBellBadge();
  updateNotifList();
}

function updateUserBadge() {
  const badge = document.getElementById('myTicketsBadge');
  if (!badge) return;
  const n = state.updatedTicketIds.size;
  if (n > 0) { badge.style.display = 'inline-flex'; badge.textContent = n; }
  else badge.style.display = 'none';
}

/* poll ทันทีเมื่อกลับมาที่แท็บ */
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && state.pollNow) state.pollNow();
});
/* ปิด dropdown เมื่อคลิกนอกพื้นที่ */
document.addEventListener('click', (e) => {
  const d = document.getElementById('notifDropdown');
  const bell = document.getElementById('bellBtn');

    d.classList.remove('show');

function openChangePasswordModal() {
  if (!state.user) return;
  document.getElementById('modalTitle').textContent = '🔑 เปลี่ยนรหัสผ่าน';
  document.getElementById('modalBody').innerHTML = `
    <div class="form-group"><label>รหัสผ่านเดิม</label>
      <input type="password" id="cpOld" class="form-control" placeholder="••••••••"></div>
    <div class="form-group"><label>รหัสผ่านใหม่ (อย่างน้อย 4 ตัว)</label>
      <input type="password" id="cpNew" class="form-control" placeholder="••••••••"></div>
    <div class="form-group"><label>ยืนยันรหัสผ่านใหม่</label>
      <input type="password" id="cpConfirm" class="form-control" placeholder="••••••••" onkeydown="if(event.key==='Enter')submitChangePassword()"></div>`;
  document.getElementById('modalFooter').innerHTML = `
    <button class="btn btn-secondary" onclick="closeModal(true)">ยกเลิก</button>
    <button class="btn btn-primary" onclick="submitChangePassword()">บันทึก</button>`;
  document.getElementById('ticketModal').classList.add('show');
}
async function submitChangePassword() {
  const oldPassword = document.getElementById('cpOld').value;
  const newPassword = document.getElementById('cpNew').value;
  const confirm2 = document.getElementById('cpConfirm').value;
  if (!oldPassword || !newPassword) { toast('กรอกให้ครบ', '', 'warning'); return; }
  if (newPassword.length < 4) { toast('รหัสใหม่สั้นไป', 'อย่างน้อย 4 ตัว', 'warning'); return; }
  if (newPassword !== confirm2) { toast('รหัสยืนยันไม่ตรงกัน', '', 'warning'); return; }
  const r = await apiPost('changePassword', {
    siteId: state.user.siteId, deptId: state.user.deptId, position: state.user.position,
    oldPassword, newPassword
  });
  if (r.ok) {
    toast('เปลี่ยนรหัสผ่านสำเร็จ', 'ใช้รหัสใหม่ครั้งต่อไป', 'success');
    if (state.user.isAdmin) state.user.adminKey = newPassword;
    saveSession();
    document.getElementById('ticketModal').classList.remove('show');
  } else toast('ไม่สำเร็จ', r.error, 'error');
}

    loadSites();

});
